<style>

input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}

<script>
var loadStatus={};
function loadScript(url,name){
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');s.src=url;s.crossOrigin='anonymous';
    s.onload=function(){loadStatus[name]='ok';resolve();};
    s.onerror=function(){loadStatus[name]='FAILED';reject(new Error(name+' failed from '+url));};
    document.head.appendChild(s);
  });
}
function showError(msg){
  document.getElementById('root').innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:24px;text-align:center;gap:12px;background:#07060f"><div style="font-size:28px">🚫</div><div style="color:#f87171;font-family:monospace;font-size:13px;line-height:1.6;max-width:320px">'+msg+'</div><div style="color:#64748b;font-size:11px">Check your internet connection and reload</div></div>';
}
(function(){
  loadScript('https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js','React')
  .catch(function(){return loadScript('https://unpkg.com/react@18/umd/react.production.min.js','React');})
  .then(function(){
    return loadScript('https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js','ReactDOM')
    .catch(function(){return loadScript('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js','ReactDOM');});
  })
  .then(function(){
    return loadScript('https://cdn.jsdelivr.net/npm/recharts@2.1.16/umd/Recharts.js','Recharts')
    .catch(function(){return loadScript('https://unpkg.com/recharts@2.1.16/umd/Recharts.js','Recharts');})
    .catch(function(){console.warn('Recharts failed to load — charts will be disabled');});
  })
  .then(function(){
    return loadScript('https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.0/babel.min.js','Babel')
    .catch(function(){return loadScript('https://unpkg.com/@babel/standalone@7.24.0/babel.min.js','Babel');});
  })
  .then(function(){
    if(typeof React==='undefined')throw new Error('React not available');
    if(typeof Babel==='undefined')throw new Error('Babel not available');
    // Recharts is optional — app degrades gracefully without charts
    if(typeof Recharts==='undefined'){
      window.Recharts={LineChart:function(){return null},Line:function(){return null},AreaChart:function(){return null},Area:function(){return null},XAxis:function(){return null},YAxis:function(){return null},CartesianGrid:function(){return null},Tooltip:function(){return null},ResponsiveContainer:function(){return null},ReferenceLine:function(){return null}};
      console.warn('Recharts not available — charts disabled');
    }
    var src=document.getElementById('app-src');
    if(!src)throw new Error('App source not found');
    var compiled;
    try{compiled=Babel.transform(src.textContent,{presets:[['react',{runtime:'classic'}]],filename:'app.jsx'}).code;}
    catch(e){throw new Error('Compile error: '+e.message.slice(0,120));}
    try{new Function(compiled)();}
    catch(e){throw new Error('Runtime error: '+e.message.slice(0,120));}
  })
  .catch(function(e){showError(e.message);});
})();
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js').catch(function(){});
  });
}
</script>
<script type="text/plain" id="app-src">
const{useState,useEffect,useReducer,useCallback,useMemo,useRef,memo}=React;
const{LineChart,Line,AreaChart,Area,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,ReferenceLine}=Recharts;

const LS={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.warn("Error:",e);}},
};
// ─── Cookie (SSO across .ironlog.space) ───
const Cookie={
  get:(name)=>{const m=document.cookie.match(new RegExp("(^| )"+name+"=([^;]+)"));return m?decodeURIComponent(m[2]):null;},
  set:(name,value,days=30)=>{const exp=new Date(Date.now()+days*864e5).toUTCString();document.cookie=`${name}=${encodeURIComponent(value)};expires=${exp};path=/;domain=.ironlog.space;SameSite=Lax`;},
  clear:(name)=>{document.cookie=`${name}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;domain=.ironlog.space`;},
};
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);

const SentryUtil={breadcrumb:()=>{},reset:()=>{}};
const SYNC_URL=LS.get("ft-api-url")||"https://api.ironlog.space";
const AuthToken={
  // Legacy — kept for backward compat during migration
  init:(email)=>{},
  generate:(email)=>"",
  getHeaders:(email)=>{
    const sessionToken=LS.get("ft-session-token");
    return{
      "Content-Type":"application/json",
      ...(sessionToken?{"X-Session-Token":sessionToken}:{}),
      "X-Auth-Token":email||"legacy",
    };
  },
};
const SessionManager={
  // Create session after signup (called with email + PIN)
  create:async(email,pin,deviceId)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/auth/session`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"create",email:email.toLowerCase(),pin,deviceId:deviceId||LS.get("ft-device-id")})
      });
      const json=await res.json();
      if(json.success&&json.token){
        LS.set("ft-session-token",json.token);
        LS.set("ft-session-email",email.toLowerCase());
        LS.set("ft-session-expires",json.expires_at);
        Cookie.set("ironlog_session",json.token,30); // SSO across subdomains
        return{success:true,token:json.token};
      }
      return{success:false,error:json.error,attempts_remaining:json.attempts_remaining};
    }catch(e){return{success:false,error:"Connection failed"};}
  },
  // Check if we have a valid session
  hasSession:()=>{
    const token=LS.get("ft-session-token");
    const expires=LS.get("ft-session-expires");
    if(!token)return false;
    if(expires&&new Date(expires)<new Date()){LS.set("ft-session-token",null);return false;}
    return true;
  },
  // Revoke (logout)
  revoke:async()=>{
    const token=LS.get("ft-session-token");
    if(token){try{await fetch(`${SYNC_URL}/api/auth/session`,{method:"POST",headers:{"Content-Type":"application/json","X-Session-Token":token},body:JSON.stringify({action:"revoke",token})});}catch(e){}}
    SentryUtil.breadcrumb("User signed out","auth");SentryUtil.reset();
    LS.set("ft-session-token",null);LS.set("ft-session-email",null);LS.set("ft-session-expires",null);LS.set("ft-is-admin",null);
    Cookie.clear("ironlog_session"); // Clear SSO cookie
  },
  // Check admin status (silent — never exposes admin to non-admins)
  checkAdmin:async()=>{
    const token=LS.get("ft-session-token");
    const email=LS.get("ft-session-email")||LS.get("ft-profile")?.email;
    if(!token&&!email)return false;
    try{
      const headers={"Content-Type":"application/json"};
      if(token)headers["X-Session-Token"]=token;
      if(email)headers["X-Auth-Token"]=email;
      const res=await fetch(`${SYNC_URL}/api/admin`,{method:"POST",headers,
        body:JSON.stringify({action:"check"})});
      if(res.ok){const json=await res.json();if(json.isAdmin){LS.set("ft-is-admin",true);return true;}}
      LS.set("ft-is-admin",null);return false;
    }catch(e){return false;}
  },
  // ─── Forgot PIN (satellite apps — canonical /api/auth/session) ───
  sendResetCode:async(email)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/auth/session`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"send_reset_code",email:email.toLowerCase()})});
      return res.ok?{success:true}:{success:false,error:"Email not found"};
    }catch(e){return{success:false,error:"Connection failed"};}
  },
  verifyResetCode:async(email,code)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/auth/session`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"verify_reset_code",email:email.toLowerCase(),code})});
      return res.ok?{success:true}:{success:false,error:"Invalid code"};
    }catch(e){return{success:false,error:"Connection failed"};}
  },
  setNewPin:async(email,code,newPin)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/auth/session`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({action:"set_new_pin",email:email.toLowerCase(),resetToken:code,newPin})});
      return res.ok?{success:true}:{success:false,error:"Reset failed"};
    }catch(e){return{success:false,error:"Connection failed"};}
  },
};
// ─── Cloud Sync (therapylog) ───
let _syncTimer=null;let _syncInFlight=false;
const CloudSync={
  push:async(state)=>{
    if(_syncInFlight)return;
    const email=state.profile?.email||LS.get("ft-session-email");
    if(!email)return;
    _syncInFlight=true;
    const payload=JSON.stringify({
      email,
      deviceId:LS.get("ft-device-id")||"unknown",
      appVersion:"therapylog-1.0",
      workouts:[],nutrition:[],body:[],photos:[],checkins:[],milestones:[],
      settings:{goals:null,units:null,schedule:null,exercises:null,
        phases:[],injuries:[],privacy:{},supplements:[],accountability:[],gamification:null},
    });
    try{
      const res=await fetch(`${SYNC_URL}/api/sync/push`,{method:"POST",headers:AuthToken.getHeaders(email),body:payload});
      if(res.status===401){LS.set("ft-session-token",null);_syncInFlight=false;return;}
      if(!res.ok)throw new Error("Push failed");
    }catch(e){console.warn("Sync push error:",e);}
    _syncInFlight=false;
  },
  debouncedPush:(state)=>{
    if(_syncTimer)clearTimeout(_syncTimer);
    _syncTimer=setTimeout(()=>CloudSync.push(state),3000);
  },
  pull:async(email,deviceId,pin)=>{
    try{
      const res=await fetch(`${SYNC_URL}/api/sync/pull`,{
        method:"POST",
        headers:AuthToken.getHeaders(email),
        body:JSON.stringify({email,deviceId,pin:pin||null}),
      });
      const json=await res.json();
      if(res.status===403&&json.pin_required)return{pin_required:true};
      if(res.status===403)return{wrong_pin:true,attempts_remaining:json.attempts_remaining,locked:json.locked};
      if(res.status===429)return{locked:true,retry_minutes:json.retry_minutes};
      if(json.success===false)return{error:json.error||"Account not found"};
      if(!res.ok)return{error:"Server error"};
      if(json.success)return json;
      return null;
    }catch(e){return{error:"Connection failed"};}
  },
};
// ─── Device ID (persistent per device) ───
if(!LS.get("ft-device-id")){
  LS.set("ft-device-id","dev_"+Math.random().toString(36).slice(2,10)+Date.now().toString(36));
}

const today=()=>new Date().toISOString().split("T")[0];
const ago=(n)=>{const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().split("T")[0];};
const fmtFull=(d)=>{try{return new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}catch(e){return d;}};
const fmtShort=(d)=>{try{const dt=new Date(d+"T12:00:00");return`${dt.getMonth()+1}/${dt.getDate()}`;}catch(e){return d;}};
const fmtTime=()=>new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});

// ─── Input Sanitization ───
const sanitize=(str)=>{if(typeof str!=="string")return"";return str.replace(/[<>&"']/g,(c)=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#39;"}[c]||c)).slice(0,5000);};
const sanitizeEntry=(text)=>{if(typeof text!=="string")return"";return text.replace(/<script[^>]*>[\s\S]*?<\/script>/gi,"").replace(/<[^>]*on\w+\s*=/gi,"").slice(0,10000);};

// ─── Data validation ───
const validateMood=(v)=>{const n=parseInt(v);return isNaN(n)?5:Math.max(1,Math.min(10,n));};
const validateDate=(d)=>{if(!d||typeof d!=="string")return"";return/^\d{4}-\d{2}-\d{2}$/.test(d)?d:"";};

// ─── Error Boundary ───
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){console.error("TherapyLog Error:",error,info);}
  render(){
    if(this.state.hasError){
      return React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",padding:24,textAlign:"center",background:"#07060f",color:"#e8e4f0"}},
        React.createElement("div",{style:{fontSize:48,marginBottom:16}},"🧠"),
        React.createElement("div",{style:{fontSize:18,fontWeight:700,marginBottom:8}},"Something went wrong"),
        React.createElement("div",{style:{fontSize:13,color:"#a099b8",marginBottom:24,maxWidth:300,lineHeight:1.6}},"Your data is safe. Try refreshing the page."),
        React.createElement("button",{onClick:()=>window.location.reload(),style:{padding:"12px 24px",borderRadius:12,background:"linear-gradient(135deg,#818cf8,#c084fc)",color:"#07060f",border:"none",fontSize:14,fontWeight:600,cursor:"pointer"}},"Refresh")
      );
    }
    return this.props.children;
  }
}

  bg:"#07060f",card:"rgba(129,140,248,0.04)",cardBorder:"rgba(129,140,248,0.1)",

  text:"#e8e4f0",text2:"#a099b8",text3:"#5c5475",
  font:"'Outfit',sans-serif",mono:"'JetBrains Mono',monospace",

  text:"#1e1b4b",text2:"#4338ca",text3:"#8b8ba7",

// ─── IRON_RANKS — shared IRONLOG ecosystem ───
const IRON_RANKS=[

// ─── TherapyLog XP Calculation ───
function calcScore(s){
  let xp=0;
  const entries=s.entries||[];
  // Check-ins: 20 XP each
  xp+=entries.filter(e=>e.mood).length*20;
  // Journal entries: 25 XP each
  xp+=entries.filter(e=>e.type==="journal").length*25;
  // Gratitude: 5 XP each (cap 15 per day)
  const gratByDay={};(s.gratitude||[]).forEach(g=>{gratByDay[g.date]=(gratByDay[g.date]||0)+1;});
  Object.values(gratByDay).forEach(n=>xp+=Math.min(n,3)*5);
  // Sessions: 50 XP each
  xp+=(s.sessions||[]).length*50;
  // Streak milestones
  let streak=0;const days=new Set(entries.filter(e=>e.mood).map(e=>e.date));
  for(let i=0;i<90;i++){const d=new Date();d.setDate(d.getDate()-i);if(days.has(d.toISOString().split("T")[0]))streak++;else break;}
  if(streak>=7)xp+=100;if(streak>=14)xp+=200;if(streak>=30)xp+=500;
  const rank=[...IRON_RANKS].reverse().find(r=>xp>=r.xpNeeded)||IRON_RANKS[0];
  const nextRank=IRON_RANKS.find(r=>r.level===rank.level+1);
  const xpIntoRank=xp-rank.xpNeeded;
  const xpForNext=nextRank?(nextRank.xpNeeded-rank.xpNeeded):null;
  const pct=xpForNext?Math.min(100,Math.round(xpIntoRank/xpForNext*100)):100;
  return{xp,rank,nextRank,xpIntoRank,xpForNext,pct,streak};
}

// ─── TherapyLog Daily Missions ───
function getDailyMissions(s){
  const td=today();
  const todayCheckin=(s.entries||[]).some(e=>e.date===td&&e.mood);
  const todayJournal=(s.entries||[]).some(e=>e.date===td&&e.note&&e.note.length>30);
  const todayGratCount=(s.gratitude||[]).filter(g=>g.date===td).length;
  const sessionThisWeek=(()=>{const d=new Date();const wStart=new Date(d);wStart.setDate(d.getDate()-d.getDay());return(s.sessions||[]).some(sess=>sess.date>=wStart.toISOString().split("T")[0]);})();
  const moodToday=(s.entries||[]).find(e=>e.date===td&&e.mood);
  const goodMood=moodToday&&moodToday.mood>=7;
  return[
    {icon:"✅",title:"Daily Check-in",desc:"Complete today's mood check-in",xp:25,done:todayCheckin},
    {icon:"📓",title:"Journal Entry",desc:"Write a journal entry (30+ chars)",xp:30,done:todayJournal},
    {icon:"🌸",title:"3 Gratitudes",desc:"Log three things you're grateful for",xp:20,done:todayGratCount>=3},
    {icon:"🛋️",title:"Log a Session",desc:"Record a therapy session this week",xp:50,done:sessionThisWeek},
    {icon:"😊",title:"Good Mood Day",desc:"Check in with a mood of 7 or higher",xp:15,done:goodMood},
    {icon:"🛡️",title:"Use Coping Tool",desc:"View the coping toolkit today",xp:10,done:LS.get("tl-coping-viewed")===td},
  ];
}

// ─── Level-Up Detection Hook ───
function useLevelUp(score,lsKey){
  const {rank}=score;
  const [celebrating,setCelebrating]=useState(false);
  const [celebRank,setCelebRank]=useState(null);
  useEffect(()=>{
    const saved=parseInt(LS.get(lsKey)||"1");
    if(rank.level>saved){
      LS.set(lsKey,rank.level);
      setCelebRank(rank);
      setTimeout(()=>setCelebrating(true),400);
    } else if(!LS.get(lsKey)){LS.set(lsKey,rank.level);}
  },[rank.level]);
  return{celebrating,celebRank,dismiss:()=>setCelebrating(false)};
}

function reducer(s,a){
  switch(a.type){

// ─── Breathing Exercise ───
function BreathingExercise({onClose}){
  const [phase,setPhase]=useState("ready");
  const [step,setStep]=useState(0);
  const [cycle,setCycle]=useState(0);
  const totalCycles=4;
  const phases=[{name:"Breathe In",dur:4,color:V.accent},{name:"Hold",dur:4,color:V.accent2},{name:"Breathe Out",dur:4,color:V.green},{name:"Hold",dur:4,color:V.warm}];
  const timerRef=useRef(null);
  const stepRef=useRef(step);
  const cycleRef=useRef(cycle);
  stepRef.current=step;cycleRef.current=cycle;

  const start=()=>{
    setPhase("active");setStep(0);setCycle(0);
    const tick=()=>{
      const s=stepRef.current;const c=cycleRef.current;
      const nextStep=(s+1)%4;
      if(nextStep===0){
        const nextCycle=c+1;
        if(nextCycle>=totalCycles){setPhase("done");return;}
        setCycle(nextCycle);cycleRef.current=nextCycle;
      }
      setStep(nextStep);stepRef.current=nextStep;
      timerRef.current=setTimeout(tick,phases[nextStep].dur*1000);
    };
    timerRef.current=setTimeout(tick,phases[0].dur*1000);
  };

  useEffect(()=>()=>{if(timerRef.current)clearTimeout(timerRef.current);},[]);

  const cur=phases[step];
  const scale=step===0?1.3:step===2?0.9:step===1?1.3:0.9;

  return(
    <Sheet title="Box Breathing" onClose={()=>{if(timerRef.current)clearTimeout(timerRef.current);onClose();}}>
      <div style={{textAlign:"center",padding:"20px 0"}}>
        {phase==="ready"&&(
          <div className="fade-up">
            <div style={{fontSize:56,marginBottom:16}}>🫧</div>
            <div style={{fontSize:18,fontWeight:700,color:V.text,marginBottom:8}}>Box Breathing</div>
            <div style={{fontSize:13,color:V.text3,lineHeight:1.6,marginBottom:8,maxWidth:280,margin:"0 auto 20px"}}>A calming technique used by therapists. Breathe in a 4-4-4-4 pattern for {totalCycles} cycles.</div>
            <Btn full onClick={start}>Begin</Btn>
          </div>
        )}
        {phase==="active"&&(
          <div>
            <div style={{fontSize:11,color:V.text3,marginBottom:20}}>Cycle {cycle+1} of {totalCycles}</div>
            <div style={{width:160,height:160,borderRadius:"50%",background:`${cur.color}12`,border:`3px solid ${cur.color}60`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px",transition:"transform 4s ease-in-out,border-color .5s,background .5s",transform:`scale(${scale})`,boxShadow:`0 0 40px ${cur.color}20`}}>
              <div>
                <div style={{fontSize:20,fontWeight:800,color:cur.color}}>{cur.name}</div>
                <div style={{fontSize:12,color:V.text3}}>{cur.dur}s</div>
              </div>
            </div>
            <div style={{display:"flex",justifyContent:"center",gap:6}}>
              {phases.map((p,i)=>(
                <div key={i} style={{width:8,height:8,borderRadius:4,background:i===step?p.color:`${V.text3}30`,transition:"background .3s"}}/>
              ))}
            </div>
          </div>
        )}
        {phase==="done"&&(
          <div className="fade-up">
            <div style={{fontSize:56,marginBottom:16}}>✨</div>
            <div style={{fontSize:18,fontWeight:700,color:V.green,marginBottom:8}}>Well done!</div>
            <div style={{fontSize:13,color:V.text3,lineHeight:1.6,marginBottom:20}}>You completed {totalCycles} breathing cycles. Notice how your body feels now.</div>
            <Btn full onClick={()=>{if(timerRef.current)clearTimeout(timerRef.current);onClose();}}>Done</Btn>
          </div>
        )}
      </div>
    </Sheet>
  );
}

// ─── JOURNAL TAB ───
function JournalTab({s,d}){
  const [showNew,setShowNew]=useState(false);
  const [text,setText]=useState("");
  const [prompt,setPrompt]=useState(PROMPTS[0]);
  const [usePrompt,setUsePrompt]=useState(false);
  const [triggers,setTriggers]=useState([]);
  const [newTrigger,setNewTrigger]=useState("");
  const [search,setSearch]=useState("");
  const [expanded,setExpanded]=useState(null);
  const [journalMood,setJournalMood]=useState(5);

  const randomPrompt=()=>setPrompt(PROMPTS[Math.floor(Math.random()*PROMPTS.length)]);

  const saveEntry=()=>{
    if(!text.trim())return;
    d({type:"ADD_ENTRY",entry:{id:uid(),date:today(),time:fmtTime(),type:"journal",mood:validateMood(journalMood),emotions:[],note:sanitizeEntry(text.trim()),prompt:usePrompt?prompt:null,triggers:triggers.map(t=>sanitize(t))}});
    Toast.show("Journal saved",V.accent);Haptic.success();
    setText("");setTriggers([]);setShowNew(false);setJournalMood(5);
  };

  const addTrigger=()=>{if(!newTrigger.trim())return;setTriggers(t=>[...t,newTrigger.trim()]);setNewTrigger("");};
  const journalEntries=s.entries.filter(e=>e.type==="journal");
  const filtered=search.trim()?journalEntries.filter(e=>(e.note||"").toLowerCase().includes(search.toLowerCase())||(e.triggers||[]).some(t=>t.toLowerCase().includes(search.toLowerCase()))):journalEntries;
  const wordCount=text.trim()?text.trim().split(/\s+/).length:0;

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      <Btn full onClick={()=>setShowNew(true)}>New Journal Entry</Btn>

      {journalEntries.length>2&&(
        <div style={{position:"relative"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search entries..."
            style={{width:"100%",padding:"10px 14px 10px 36px",background:"rgba(255,255,255,0.04)",border:`1.5px solid ${V.cardBorder}`,borderRadius:14,color:V.text,fontSize:13,fontFamily:V.font,outline:"none",boxSizing:"border-box",transition:"border-color .2s"}}/>
          <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round" style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:V.text3,cursor:"pointer",fontSize:14,padding:4}}>×</button>}
        </div>
      )}

      {journalEntries.length>0&&(
        <div style={{display:"flex",gap:12,fontSize:10,color:V.text3}}>
          <span>{journalEntries.length} entr{journalEntries.length===1?"y":"ies"}</span>
          <span>{journalEntries.reduce((a,e)=>(e.note?a+e.note.split(/\s+/).length:a),0).toLocaleString()} total words</span>
        </div>
      )}

      {journalEntries.length===0&&(
        <Card style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:48,marginBottom:12,animation:"gentleFloat 3s ease-in-out infinite"}}>📓</div>
          <div style={{fontSize:16,fontWeight:600,color:V.text2,marginBottom:6}}>Your journal awaits</div>
          <div style={{fontSize:13,color:V.text3,marginBottom:16,lineHeight:1.6}}>Writing helps process emotions and gain clarity. Start with a prompt or free-write.</div>
          <Btn v="small" onClick={()=>setShowNew(true)}>Start Writing</Btn>
        </Card>
      )}

      {search&&filtered.length===0&&(
        <div style={{textAlign:"center",padding:"20px 0",color:V.text3,fontSize:13}}>No entries match "{search}"</div>
      )}

      {filtered.map((e,idx)=>{
        const isExpanded=expanded===e.id;
        const preview=e.note?.length>180&&!isExpanded;
        return(
        <Card key={e.id} style={{padding:14,animationDelay:idx*0.03+"s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <div style={{fontSize:12,color:V.text3}}>{fmtFull(e.date)}{e.time?` · ${e.time}`:""}</div>
              {e.note&&<div style={{fontSize:10,color:V.text3,marginTop:2}}>{e.note.split(/\s+/).length} words</div>}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {e.mood&&<div style={{padding:"2px 8px",borderRadius:8,background:`${(e.mood<=3?V.danger:e.mood<=6?V.warm:V.green)}12`,display:"flex",alignItems:"center",gap:3}}>
                <span style={{fontSize:12,fontWeight:700,fontFamily:V.mono,color:e.mood<=3?V.danger:e.mood<=6?V.warm:V.green}}>{e.mood}</span>
              </div>}
              <button onClick={()=>Confirm.show("Delete entry?","This cannot be undone.",()=>d({type:"DEL_ENTRY",id:e.id}))} aria-label="Delete entry" style={{background:"none",border:"none",padding:4,cursor:"pointer",opacity:.5}}>
                <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          </div>
          {e.prompt&&<div style={{fontSize:11,color:V.accent,fontStyle:"italic",marginBottom:8,paddingLeft:10,borderLeft:`2.5px solid ${V.accent}30`,borderRadius:1}}>{e.prompt}</div>}
          <div style={{fontSize:13,color:V.text2,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{preview?e.note.slice(0,180)+"...":e.note}</div>
          {preview&&<button onClick={()=>setExpanded(e.id)} style={{background:"none",border:"none",color:V.accent,fontSize:12,fontWeight:600,cursor:"pointer",padding:"4px 0",fontFamily:V.font,marginTop:4}}>Read more</button>}
          {isExpanded&&e.note?.length>180&&<button onClick={()=>setExpanded(null)} style={{background:"none",border:"none",color:V.text3,fontSize:12,cursor:"pointer",padding:"4px 0",fontFamily:V.font,marginTop:4}}>Show less</button>}
          {e.triggers?.length>0&&(
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}>
              {e.triggers.map((t,i)=>(
                <span key={i} style={{fontSize:10,padding:"3px 10px",borderRadius:12,background:"rgba(244,63,94,0.1)",color:V.danger,fontWeight:600}}>⚡ {t}</span>
              ))}
            </div>
          )}
        </Card>
      );})}

      {showNew&&(
        <Sheet title="New Entry" onClose={()=>{setShowNew(false);setText("");setTriggers([]);}} footer={
          <div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontSize:10,color:V.text3}}>{wordCount} word{wordCount!==1?"s":""}</span>
              <span style={{fontSize:10,color:text.length>9000?V.danger:V.text3}}>{text.length}/10,000</span>
            </div>
            <Btn full onClick={saveEntry} disabled={!text.trim()}>Save Entry</Btn>
          </div>
        }>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <button onClick={()=>setUsePrompt(u=>!u)} style={{padding:"8px 14px",borderRadius:22,border:`1.5px solid ${usePrompt?V.accent:V.cardBorder}`,background:usePrompt?`${V.accent}12`:"transparent",color:usePrompt?V.accent:V.text3,fontSize:12,cursor:"pointer",fontFamily:V.font,transition:"all .15s"}}>
              {usePrompt?"✓ Using Prompt":"Use a Prompt"}
            </button>
            {usePrompt&&<button onClick={randomPrompt} style={{padding:"8px 14px",borderRadius:22,border:`1px solid ${V.cardBorder}`,background:"transparent",color:V.text3,fontSize:12,cursor:"pointer",fontFamily:V.font}}>Shuffle</button>}
          </div>
          {usePrompt&&<div style={{padding:"12px 16px",borderRadius:14,background:`${V.accent}06`,border:`1px solid ${V.accent}12`,fontSize:13,color:V.accent2,lineHeight:1.6,marginBottom:14,fontStyle:"italic"}}>{prompt}</div>}
          <Field value={text} onChange={setText} rows={8} placeholder="Start writing..." autoFocus/>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>Mood while writing</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <input type="range" min={1} max={10} value={journalMood} onChange={e=>setJournalMood(parseInt(e.target.value))}
                style={{flex:1,height:6,borderRadius:3,background:`linear-gradient(90deg,${journalMood<=3?V.danger:journalMood<=6?V.warm:V.green} ${(journalMood-1)/9*100}%,rgba(255,255,255,0.08) ${(journalMood-1)/9*100}%)`}}/>
              <span style={{fontSize:14,fontWeight:700,fontFamily:V.mono,color:journalMood<=3?V.danger:journalMood<=6?V.warm:V.green,minWidth:20,textAlign:"center"}}>{journalMood}</span>
            </div>
          </div>
          <div style={{marginTop:4}}>
            <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Triggers (optional)</div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              <input value={newTrigger} onChange={e=>setNewTrigger(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTrigger()} placeholder="e.g. work stress, conflict..."
                style={{flex:1,padding:"10px 14px",background:"rgba(255,255,255,0.04)",border:`1.5px solid ${V.cardBorder}`,borderRadius:12,color:V.text,fontSize:13,fontFamily:V.font,outline:"none",transition:"border-color .2s"}}/>
              <button onClick={addTrigger} style={{padding:"10px 16px",borderRadius:12,background:`${V.danger}12`,border:`1px solid ${V.danger}20`,color:V.danger,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:V.font}}>Add</button>
            </div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {triggers.map((t,i)=>(
                <span key={i} onClick={()=>setTriggers(ts=>ts.filter((_,j)=>j!==i))} style={{fontSize:11,padding:"4px 12px",borderRadius:14,background:"rgba(244,63,94,0.1)",color:V.danger,fontWeight:600,cursor:"pointer",transition:"opacity .15s"}}>⚡ {t} ×</span>
              ))}
            </div>
          </div>
        </Sheet>
      )}
    </div>
  );
}

// ─── SESSIONS TAB ───
function SessionsTab({s,d}){
  const [showNew,setShowNew]=useState(false);
  const [form,setForm]=useState({date:today(),therapist:s.profile?.therapist||"",duration:"50",notes:"",homework:"",mood_before:"5",mood_after:"6",topics:[]});
  const TOPICS=SESSION_TOPICS;
  const toggleTopic=(t)=>setForm(f=>({...f,topics:f.topics.includes(t)?f.topics.filter(x=>x!==t):[...f.topics,t]}));

  const save=()=>{
    const session={id:uid(),date:validateDate(form.date)||today(),therapist:sanitize(form.therapist),duration:Math.max(1,Math.min(480,parseInt(form.duration)||50)),notes:sanitizeEntry(form.notes),homework:sanitizeEntry(form.homework),mood_before:validateMood(form.mood_before),mood_after:validateMood(form.mood_after),topics:form.topics.filter(t=>TOPICS.includes(t))};
    d({type:"ADD_SESSION",session});Toast.show("Session logged",V.accent2);Haptic.success();setShowNew(false);
    setForm({date:today(),therapist:s.profile?.therapist||"",duration:"50",notes:"",homework:"",mood_before:"5",mood_after:"6",topics:[]});
  };

  // Session insights
  const avgMoodChange=s.sessions.length?Math.round(s.sessions.reduce((a,se)=>a+(se.mood_after-se.mood_before),0)/s.sessions.length*10)/10:0;
  const totalHours=Math.round(s.sessions.reduce((a,se)=>a+(se.duration||0),0)/60*10)/10;
  const topTopics=useMemo(()=>{const counts={};s.sessions.forEach(se=>(se.topics||[]).forEach(t=>{counts[t]=(counts[t]||0)+1;}));return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3);},[s.sessions]);

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      <Btn full onClick={()=>setShowNew(true)}>Log Session</Btn>

      {s.profile?.nextSession&&(
        <Card style={{padding:14,background:`${V.accent}05`,border:`1px solid ${V.accent}18`}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:44,height:44,borderRadius:12,background:`${V.accent}10`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🛋️</div>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:V.text3,fontWeight:600}}>NEXT SESSION</div>
              <div style={{fontSize:15,fontWeight:700,color:V.accent}}>{fmtFull(s.profile.nextSession)}</div>
              {s.profile.therapist&&<div style={{fontSize:12,color:V.text3,marginTop:1}}>{s.profile.therapist}</div>}
            </div>
          </div>
        </Card>
      )}

      {/* Session insights summary */}
      {s.sessions.length>=2&&(
        <Card style={{padding:14}}>
          <div style={{fontSize:13,fontWeight:700,color:V.text,marginBottom:10}}>Session Insights</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:topTopics.length?10:0}}>
            <div style={{textAlign:"center",padding:"8px 4px",borderRadius:10,background:"rgba(255,255,255,0.02)"}}>
              <div style={{fontSize:10,color:V.text3,marginBottom:2}}>Total</div>
              <div style={{fontSize:16,fontWeight:800,fontFamily:V.mono,color:V.accent2}}>{s.sessions.length}</div>
            </div>
            <div style={{textAlign:"center",padding:"8px 4px",borderRadius:10,background:"rgba(255,255,255,0.02)"}}>
              <div style={{fontSize:10,color:V.text3,marginBottom:2}}>Hours</div>
              <div style={{fontSize:16,fontWeight:800,fontFamily:V.mono,color:V.accent}}>{totalHours}</div>
            </div>
            <div style={{textAlign:"center",padding:"8px 4px",borderRadius:10,background:"rgba(255,255,255,0.02)"}}>
              <div style={{fontSize:10,color:V.text3,marginBottom:2}}>Avg Change</div>
              <div style={{fontSize:16,fontWeight:800,fontFamily:V.mono,color:avgMoodChange>0?V.green:avgMoodChange<0?V.danger:V.text3}}>
                {avgMoodChange>0?"+":""}{avgMoodChange}
              </div>
            </div>
          </div>
          {topTopics.length>0&&(
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:V.text3,lineHeight:"22px"}}>Top topics:</span>
              {topTopics.map(([t,c])=>(
                <span key={t} style={{fontSize:10,padding:"2px 10px",borderRadius:12,background:`${V.accent}10`,color:V.accent,fontWeight:600}}>{t} ({c})</span>
              ))}
            </div>
          )}
        </Card>
      )}

      {s.sessions.length===0&&(
        <Card style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:48,marginBottom:12,animation:"gentleFloat 3s ease-in-out infinite"}}>🛋️</div>
          <div style={{fontSize:16,fontWeight:600,color:V.text2,marginBottom:6}}>No sessions logged yet</div>
          <div style={{fontSize:13,color:V.text3,marginBottom:16,lineHeight:1.6}}>Track your therapy progress, homework, and mood changes after each session.</div>
          <Btn v="small" onClick={()=>setShowNew(true)}>Log Your First Session</Btn>
        </Card>
      )}

      {s.sessions.map((session,idx)=>{
        const moodDelta=session.mood_after-session.mood_before;
        return(
        <Card key={session.id} style={{padding:14,animationDelay:idx*0.03+"s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:V.text}}>{session.therapist||"Therapy Session"}</div>
              <div style={{fontSize:11,color:V.text3}}>{fmtFull(session.date)} · {session.duration}min</div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              {/* Mood change badge */}
              <div style={{padding:"4px 10px",borderRadius:10,background:`${moodDelta>0?V.green:moodDelta<0?V.danger:V.text3}10`,border:`1px solid ${moodDelta>0?V.green:moodDelta<0?V.danger:V.text3}25`,display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:12,fontFamily:V.mono,fontWeight:700,color:session.mood_before<=4?V.danger:session.mood_before<=6?V.warm:V.green}}>{session.mood_before}</span>
                <span style={{fontSize:10,color:V.text3}}>→</span>
                <span style={{fontSize:12,fontFamily:V.mono,fontWeight:700,color:session.mood_after<=4?V.danger:session.mood_after<=6?V.warm:V.green}}>{session.mood_after}</span>
                {moodDelta!==0&&<span style={{fontSize:10,fontWeight:700,color:moodDelta>0?V.green:V.danger}}>({moodDelta>0?"+":""}{moodDelta})</span>}
              </div>
              <button onClick={()=>Confirm.show("Delete session?","This cannot be undone.",()=>d({type:"DEL_SESSION",id:session.id}))} aria-label="Delete session" style={{background:"none",border:"none",padding:4,cursor:"pointer",opacity:.5}}>
                <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
              </button>
            </div>
          </div>
          {session.topics?.length>0&&(
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
              {session.topics.map((t,i)=>(

          {session.notes&&<div style={{fontSize:13,color:V.text2,lineHeight:1.6,marginBottom:6}}>{session.notes}</div>}
          {session.homework&&(

              <div style={{fontSize:10,color:V.accent2,fontWeight:700,marginBottom:3}}>HOMEWORK / ACTION ITEMS</div>
              <div style={{fontSize:12,color:V.text2,lineHeight:1.5}}>{session.homework}</div>
            </div>
          )}
        </Card>
      );})}

      {showNew&&(
        <Sheet title="Log Session" onClose={()=>setShowNew(false)} footer={<Btn full onClick={save}>Save Session</Btn>}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Date" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
            <Field label="Duration (min)" type="number" value={form.duration} onChange={v=>setForm(f=>({...f,duration:v}))}/>
          </div>
          <Field label="Therapist Name" value={form.therapist} onChange={v=>setForm(f=>({...f,therapist:v}))} placeholder="Optional"/>

              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <div>
              <div style={{fontSize:11,color:V.text3,fontWeight:600,marginBottom:6}}>MOOD BEFORE</div>
              <input type="range" min={1} max={10} value={form.mood_before} onChange={e=>setForm(f=>({...f,mood_before:e.target.value}))} style={{width:"100%"}}/>
              <div style={{textAlign:"center",fontSize:14,fontWeight:700,color:parseInt(form.mood_before)<=3?V.danger:parseInt(form.mood_before)<=6?V.warm:V.green,fontFamily:V.mono}}>{form.mood_before}</div>
            </div>
            <div>
              <div style={{fontSize:11,color:V.text3,fontWeight:600,marginBottom:6}}>MOOD AFTER</div>
              <input type="range" min={1} max={10} value={form.mood_after} onChange={e=>setForm(f=>({...f,mood_after:e.target.value}))} style={{width:"100%"}}/>
              <div style={{textAlign:"center",fontSize:14,fontWeight:700,color:parseInt(form.mood_after)<=3?V.danger:parseInt(form.mood_after)<=6?V.warm:V.green,fontFamily:V.mono}}>{form.mood_after}</div>
            </div>
          </div>
          <Field label="Session Notes" value={form.notes} onChange={v=>setForm(f=>({...f,notes:v}))} rows={3} placeholder="What did we discuss? Key insights?"/>
          <Field label="Homework / Action Items" value={form.homework} onChange={v=>setForm(f=>({...f,homework:v}))} rows={2} placeholder="What will you practice this week?"/>
        </Sheet>
      )}
    </div>
  );
}

// ─── TRENDS TAB ───
function TrendsTab({s}){
  const [range,setRange]=useState(30);
  const rangeOpts=[{label:"7d",val:7},{label:"30d",val:30},{label:"90d",val:90},{label:"All",val:365}];

  const moodData=useMemo(()=>s.entries.filter(e=>e.mood&&e.date>=ago(range-1)).sort((a,b)=>a.date.localeCompare(b.date)).map(e=>({date:fmtShort(e.date),mood:e.mood})),[s.entries,range]);
  const sessionMoodData=useMemo(()=>s.sessions.filter(e=>e.date>=ago(range-1)).sort((a,b)=>a.date.localeCompare(b.date)).map((e,i)=>({label:`S${i+1}`,before:e.mood_before,after:e.mood_after})),[s.sessions,range]);
  const emotionCounts=useMemo(()=>{
    const counts={};
    s.entries.filter(e=>e.date>=ago(range-1)).forEach(e=>e.emotions?.forEach(em=>{counts[em]=(counts[em]||0)+1;}));
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  },[s.entries,range]);

  if(s.entries.filter(e=>e.mood).length<3)return(
    <div className="fade-up" style={{textAlign:"center",padding:"60px 20px",color:V.text3}}>
      <div style={{fontSize:56,marginBottom:16,animation:"gentleFloat 3s ease-in-out infinite"}}>📈</div>
      <div style={{fontSize:18,fontWeight:600,color:V.text2,marginBottom:6}}>Almost there!</div>
      <div style={{fontSize:13,lineHeight:1.6,marginBottom:16}}>Complete {3-s.entries.filter(e=>e.mood).length} more daily check-in{3-s.entries.filter(e=>e.mood).length!==1?"s":""} to unlock your mood trends and insights.</div>
      <div style={{maxWidth:200,margin:"0 auto"}}>
        <Progress val={s.entries.filter(e=>e.mood).length} max={3} color={V.accent} h={6}/>
        <div style={{fontSize:10,color:V.text3,marginTop:8}}>{s.entries.filter(e=>e.mood).length}/3 check-ins</div>
      </div>
    </div>
  );

  const recent7=s.entries.filter(e=>e.date>=ago(6)&&e.mood);
  const avgMood=recent7.length?Math.round(recent7.reduce((a,e)=>a+e.mood,0)/recent7.length*10)/10:0;
  const checkinDays=new Set(s.entries.filter(e=>e.mood&&e.date>=ago(range-1)).map(e=>e.date)).size;
  const journalCount=s.entries.filter(e=>e.type==="journal"&&e.date>=ago(range-1)).length;

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* Time range selector */}
      <div style={{display:"flex",gap:4,background:"rgba(255,255,255,0.03)",borderRadius:12,padding:3}}>
        {rangeOpts.map(r=>(
          <button key={r.val} onClick={()=>setRange(r.val)} style={{flex:1,padding:"8px 0",borderRadius:10,border:"none",background:range===r.val?`${V.accent}18`:"transparent",color:range===r.val?V.accent:V.text3,fontSize:12,fontWeight:range===r.val?700:500,cursor:"pointer",fontFamily:V.font,transition:"all .2s"}}>{r.label}</button>
        ))}
      </div>

      {/* Stats overview */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
        {[
          {label:"Avg Mood",value:avgMood||"--",color:avgMood<=4?V.danger:avgMood<=6?V.warm:V.green},
          {label:"Check-ins",value:checkinDays,color:V.accent},
          {label:"Journals",value:journalCount,color:V.accent2},
          {label:"Sessions",value:s.sessions.filter(e=>e.date>=ago(range-1)).length,color:V.warm},
        ].map(m=>(
          <Card key={m.label} style={{padding:10,textAlign:"center"}}>
            <div style={{fontSize:9,color:V.text3,fontWeight:600,marginBottom:2}}>{m.label}</div>
            <div style={{fontSize:18,fontWeight:800,color:m.color,fontFamily:V.mono}}>{m.value}</div>
          </Card>
        ))}
      </div>

      {moodData.length>1&&(
        <Card>
          <div style={{fontSize:10,fontWeight:700,color:V.text3,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Mood Trend ({rangeOpts.find(r=>r.val===range)?.label})</div>
          <ResponsiveContainer width="100%" height={160}>
            <AreaChart data={moodData}>
              <defs><linearGradient id="moodGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={V.accent} stopOpacity={0.3}/><stop offset="95%" stopColor={V.accent} stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid {...chartCfg.grid} vertical={false}/>
              <XAxis dataKey="date" {...chartCfg.axis} interval="preserveStartEnd"/>
              <YAxis {...chartCfg.axis} width={20} domain={[1,10]}/>
              <Tooltip {...chartCfg.tip}/>
              <ReferenceLine y={5} stroke={V.cardBorder} strokeDasharray="3 3" label={{value:"Baseline",fill:V.text3,fontSize:8,position:"insideTopLeft"}}/>
              <Area type="monotone" dataKey="mood" stroke={V.accent} strokeWidth={2.5} fill="url(#moodGrad)" name="Mood" dot={moodData.length<=14}/>
            </AreaChart>
          </ResponsiveContainer>
        </Card>
      )}

      {sessionMoodData.length>1&&(
        <Card>
          <div style={{fontSize:10,fontWeight:700,color:V.text3,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Session Mood Before / After</div>
          <ResponsiveContainer width="100%" height={140}>
            <LineChart data={sessionMoodData}>
              <CartesianGrid {...chartCfg.grid} vertical={false}/>
              <XAxis dataKey="label" {...chartCfg.axis}/>
              <YAxis {...chartCfg.axis} width={20} domain={[1,10]}/>
              <Tooltip {...chartCfg.tip}/>
              <Line type="monotone" dataKey="before" stroke={V.warm} strokeWidth={2} dot={{r:3,fill:V.warm}} name="Before"/>
              <Line type="monotone" dataKey="after" stroke={V.green} strokeWidth={2} dot={{r:3,fill:V.green}} name="After"/>
            </LineChart>
          </ResponsiveContainer>
          <div style={{display:"flex",gap:16,marginTop:8,justifyContent:"center"}}>
            {[{c:V.warm,l:"Before"},{c:V.green,l:"After"}].map(x=>(
              <div key={x.l} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:10,height:10,borderRadius:3,background:x.c}}/><span style={{fontSize:10,color:V.text3}}>{x.l}</span></div>
            ))}
          </div>
        </Card>
      )}

      {/* Wellness Insights */}
      {moodData.length>=5&&(()=>{
        const recentAvg=moodData.slice(-7).reduce((a,d)=>a+d.mood,0)/Math.min(7,moodData.length);
        const olderAvg=moodData.length>7?moodData.slice(0,-7).reduce((a,d)=>a+d.mood,0)/moodData.slice(0,-7).length:recentAvg;
        const trend=recentAvg-olderAvg;
        const positiveEmotions=s.entries.filter(e=>e.date>=ago(range-1)).reduce((c,e)=>c+(e.emotions||[]).filter(em=>EMOTIONS.find(x=>x.label===em)?.valence>0).length,0);
        const negativeEmotions=s.entries.filter(e=>e.date>=ago(range-1)).reduce((c,e)=>c+(e.emotions||[]).filter(em=>EMOTIONS.find(x=>x.label===em)?.valence<0).length,0);
        const ratio=negativeEmotions>0?(positiveEmotions/negativeEmotions).toFixed(1):"--";
        const bestDay=moodData.reduce((best,d)=>d.mood>best.mood?d:best,moodData[0]);
        const worstDay=moodData.reduce((worst,d)=>d.mood<worst.mood?d:worst,moodData[0]);
        return(
          <Card style={{padding:14}}>
            <div style={{fontSize:10,fontWeight:700,color:V.text3,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Wellness Insights</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div style={{padding:"12px 14px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:`1px solid ${V.cardBorder}`}}>
                <div style={{fontSize:10,color:V.text3,marginBottom:4}}>Mood Direction</div>
                <div style={{fontSize:15,fontWeight:800,color:trend>0.3?V.green:trend<-0.3?V.danger:V.accent,fontFamily:V.mono}}>
                  {trend>0.3?"Improving":trend<-0.3?"Declining":"Stable"}
                </div>
                <div style={{fontSize:10,color:V.text3,marginTop:2}}>{trend>0?"+":" "}{(trend*10/10).toFixed(1)} pts</div>
              </div>
              <div style={{padding:"12px 14px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:`1px solid ${V.cardBorder}`}}>
                <div style={{fontSize:10,color:V.text3,marginBottom:4}}>Positive:Negative</div>
                <div style={{fontSize:15,fontWeight:800,color:parseFloat(ratio)>=2?V.green:parseFloat(ratio)>=1?V.accent:V.warm,fontFamily:V.mono}}>{ratio}:1</div>
                <div style={{fontSize:10,color:V.text3,marginTop:2}}>{positiveEmotions}+ / {negativeEmotions}-</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div style={{padding:"8px 12px",borderRadius:10,background:`${V.green}06`,border:`1px solid ${V.green}15`}}>
                <div style={{fontSize:10,color:V.text3}}>Best day</div>
                <div style={{fontSize:13,fontWeight:700,color:V.green}}>{bestDay.date} ({bestDay.mood}/10)</div>
              </div>
              <div style={{padding:"8px 12px",borderRadius:10,background:`${V.warm}06`,border:`1px solid ${V.warm}15`}}>
                <div style={{fontSize:10,color:V.text3}}>Hardest day</div>
                <div style={{fontSize:13,fontWeight:700,color:V.warm}}>{worstDay.date} ({worstDay.mood}/10)</div>
              </div>
            </div>
            {trend>0.3&&<div style={{fontSize:12,color:V.green,marginTop:10,display:"flex",alignItems:"center",gap:4}}><span>📈</span> Your mood has been trending upward. Keep going!</div>}
            {trend<-0.3&&<div style={{fontSize:12,color:V.warm,marginTop:10,display:"flex",alignItems:"center",gap:4}}><span>💛</span> Your mood has dipped recently. Consider reaching out to your therapist or trying a coping strategy.</div>}
          </Card>
        );
      })()}

      {emotionCounts.length>0&&(
        <Card style={{padding:14}}>
          <div style={{fontSize:10,fontWeight:700,color:V.text3,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Emotion Frequency</div>
          {emotionCounts.map(([em,count],idx)=>{
            const emotionObj=EMOTIONS.find(e=>e.label===em);
            const max=emotionCounts[0][1];
            return(
              <div key={em} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,animation:`fadeUp .3s ease ${idx*0.05}s both`}}>
                <span style={{fontSize:18,width:24,flexShrink:0,textAlign:"center"}}>{emotionObj?.e||"😐"}</span>
                <span style={{fontSize:12,color:V.text2,width:80,flexShrink:0,fontWeight:500}}>{em}</span>
                <div style={{flex:1,height:8,borderRadius:4,background:"rgba(255,255,255,0.05)"}}>
                  <div style={{height:"100%",borderRadius:4,width:`${count/max*100}%`,background:`linear-gradient(90deg,${emotionObj?.valence>0?V.green:emotionObj?.valence<0?V.danger:V.warm},${emotionObj?.valence>0?V.green:emotionObj?.valence<0?V.danger:V.warm}60)`,transition:"width .5s ease"}}/>
                </div>
                <span style={{fontSize:12,color:V.text2,fontFamily:V.mono,width:24,textAlign:"right",fontWeight:600}}>{count}</span>
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}

// ─── SETTINGS TAB ───
function SettingsTab({s,d,score}){

  const toggle=(id)=>setOpen(o=>o===id?null:id);

  const Row=({id,icon,label,desc,children})=>(
    <div style={{background:V.card,border:`1px solid ${open===id?`${V.accent}25`:V.cardBorder}`,borderRadius:16,overflow:"hidden",marginBottom:8,transition:"border-color .2s"}}>
      <button onClick={()=>toggle(id)} style={{display:"flex",alignItems:"center",gap:12,padding:"16px 16px",width:"100%",background:"none",border:"none",cursor:"pointer",textAlign:"left",WebkitTapHighlightColor:"transparent"}}>
        <div style={{width:38,height:38,borderRadius:10,background:`${V.accent}08`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{icon}</div>
        <div style={{flex:1}}>
          <span style={{fontSize:14,fontWeight:600,color:V.text,display:"block"}}>{label}</span>
          {desc&&<span style={{fontSize:11,color:V.text3}}>{desc}</span>}
        </div>
        <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round" style={{transition:"transform .25s cubic-bezier(.22,1,.36,1)",transform:open===id?"rotate(90deg)":"none"}}><polyline points="9 18 15 12 9 6"/></svg>

        <Field label="Next Session Date" type="date" value={profile.nextSession||""} onChange={v=>setProfile(p=>({...p,nextSession:v}))}/>

      <Row id="account" icon="🔐" label="Account" desc="IRONLOG authentication">
        <div style={{fontSize:13,color:V.text3,marginBottom:12,lineHeight:1.5}}>TherapyLog uses your IRONLOG account for authentication. Your journal data stays on this device.</div>
        <div style={{padding:"12px 14px",borderRadius:12,background:"rgba(255,255,255,0.02)",marginBottom:12,border:`1px solid ${V.cardBorder}`}}>
          <div style={{fontSize:10,color:V.text3,marginBottom:2}}>Signed in as</div>
          <div style={{fontSize:13,fontWeight:600,color:V.text}}>{LS.get("ft-session-email")||"Not signed in"}</div>
        </div>
        <a href="https://ironlog.space" target="_blank" rel="noopener" style={{display:"block",width:"100%",padding:"12px",borderRadius:12,border:`1px solid ${V.accent}25`,background:`${V.accent}06`,color:V.accent,fontSize:13,fontWeight:600,textAlign:"center",textDecoration:"none",boxSizing:"border-box"}}>Open IronLog</a>
      </Row>

      <Row id="rank" icon="🏆" label="IRON Rank" desc={`${score.rank.name} · ${score.xp.toLocaleString()} XP`}>

        <div style={{marginTop:12,fontSize:11,color:V.text3,lineHeight:1.5}}>Your IRON Rank is shared across the IRONLOG app ecosystem. Complete daily missions and log consistently to level up.</div>
        <a href="https://ironlog.space" target="_blank" rel="noopener" style={{display:"block",marginTop:10,padding:"10px 14px",borderRadius:12,border:`1px solid ${V.accent}25`,background:`${V.accent}06`,color:V.accent,fontSize:12,fontWeight:600,textDecoration:"none",textAlign:"center",boxSizing:"border-box"}}>Open IRONLOG</a>
      </Row>
      <Row id="theme" icon="🎨" label="Appearance" desc={V.mode==="dark"?"Dark mode":"Light mode"}>
        <div style={{display:"flex",gap:8}}>
          {["dark","light"].map(mode=>(
            <button key={mode} onClick={()=>{setTheme(mode);}} style={{flex:1,padding:"14px",borderRadius:14,border:`1.5px solid ${V.mode===mode?V.accent:V.cardBorder}`,background:V.mode===mode?`${V.accent}12`:"rgba(255,255,255,0.03)",color:V.mode===mode?V.accent:V.text3,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:V.font,display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all .2s"}}>
              {mode==="dark"?"🌙":"☀️"} {mode.charAt(0).toUpperCase()+mode.slice(1)}
            </button>
          ))}
        </div>
      </Row>
      <Row id="privacy" icon="🔒" label="Privacy & Data" desc={`${s.entries.length} entries · ${s.sessions.length} sessions`}>
        <div style={{fontSize:13,color:V.text2,marginBottom:12,lineHeight:1.6}}>All journal entries and mood data are stored <strong style={{color:V.text}}>only on this device</strong>. Nothing is uploaded to any server.</div>
        <div style={{padding:"12px 14px",borderRadius:14,background:"rgba(52,211,153,0.05)",border:"1px solid rgba(52,211,153,0.18)",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,borderRadius:8,background:"rgba(52,211,153,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>🛡️</div>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:V.green}}>Privacy First</div>
              <div style={{fontSize:11,color:V.text3}}>Zero data collection. No analytics. No tracking.</div>
            </div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
          {[
            {label:"ENTRIES",val:s.entries.length,color:V.accent},
            {label:"SESSIONS",val:s.sessions.length,color:V.accent2},
            {label:"GRATITUDES",val:s.gratitude.length,color:V.green}
          ].map(x=>(
            <div key={x.label} style={{textAlign:"center",padding:"10px 8px",borderRadius:12,background:"rgba(255,255,255,0.02)",border:`1px solid ${V.cardBorder}`}}>

          Toast.show("Data exported",V.accent);

        <Btn v="secondary" full onClick={()=>{
          const input=document.createElement("input");input.type="file";input.accept=".json";
          input.onchange=(e)=>{
            const file=e.target.files[0];if(!file)return;
            const reader=new FileReader();
            reader.onload=(ev)=>{
              try{
                const data=JSON.parse(ev.target.result);
                if(!data.entries&&!data.sessions){Toast.show("Invalid backup file",V.danger);return;}
                Confirm.show("Import data?","This will merge the backup with your existing data. No data will be overwritten.",()=>{
                  const existing=new Set(s.entries.map(e=>e.id));
                  const newEntries=(data.entries||[]).filter(e=>e.id&&!existing.has(e.id));
                  const existingSessions=new Set(s.sessions.map(e=>e.id));
                  const newSessions=(data.sessions||[]).filter(e=>e.id&&!existingSessions.has(e.id));
                  const existingGrat=new Set(s.gratitude.map(e=>e.id));
                  const newGrat=(data.gratitude||[]).filter(e=>e.id&&!existingGrat.has(e.id));
                  newEntries.forEach(entry=>d({type:"ADD_ENTRY",entry}));
                  newSessions.forEach(session=>d({type:"ADD_SESSION",session}));
                  newGrat.forEach(g=>d({type:"ADD_GRATITUDE",g}));
                  Toast.show(`Imported ${newEntries.length+newSessions.length+newGrat.length} items`,V.green);
                });
              }catch(err){Toast.show("Could not read file",V.danger);}
            };
            reader.readAsText(file);
          };
          input.click();
        }} s={{marginBottom:8}}>Import Backup</Btn>
        <Btn v="danger" full onClick={()=>Confirm.show("Delete all data?","Journal entries, sessions, and gratitude logs will be permanently deleted. This cannot be undone.",()=>{
          LS.set("tl-entries",[]);LS.set("tl-sessions",[]);LS.set("tl-gratitude",[]);LS.set("tl-profile",{});window.location.reload();
        })}>Delete All Data</Btn>
      </Row>
    </div>
  );
}

// ─── APP ───
function App(){
  const [s,d]=useReducer(reducer,init);
  const [,forceUpdate]=useState(0);
  useEffect(()=>{window._themeRefresh=()=>forceUpdate(c=>c+1);return()=>{delete window._themeRefresh;};},[]);

  const score=useMemo(()=>calcScore(s),[s.entries,s.sessions,s.gratitude]);
  const missions=useMemo(()=>getDailyMissions(s),[s.entries,s.sessions,s.gratitude]);
  const {celebrating,celebRank,dismiss:dismissLevel}=useLevelUp(score,"tl-last-level");
  useEffect(()=>{
    (async()=>{
      try{
        const entries=Array.isArray(LS.get("tl-entries"))?LS.get("tl-entries"):[];
        const sessions=Array.isArray(LS.get("tl-sessions"))?LS.get("tl-sessions"):[];
        const gratitude=Array.isArray(LS.get("tl-gratitude"))?LS.get("tl-gratitude"):[];
        const localProfile=LS.get("tl-profile")||{};
        // ── SSO: try silent login from IronLog session ──
        if(!LS.get("ft-session-token")){
          const ssoToken=Cookie.get("ironlog_session");
          if(ssoToken){
            try{
              const vRes=await fetch(`${SYNC_URL}/api/auth/session`,{method:"POST",
                headers:{"Content-Type":"application/json","X-Session-Token":ssoToken},
                body:JSON.stringify({action:"validate"})});
              const vJson=await vRes.json();
              if(vJson.valid&&vJson.email){
                const deviceId=LS.get("ft-device-id")||uid();
                LS.set("ft-device-id",deviceId);
                LS.set("ft-session-token",ssoToken);
                LS.set("ft-session-email",vJson.email);
                const pull=await CloudSync.pull(vJson.email,deviceId,null);
                if(pull?.success&&pull?.data?.profile){
                  LS.set("ft-profile",pull.data.profile);
                }
              }
            }catch(e){/* SSO failed silently */}
          }
        }
        const onboarded=!!(LS.get("ft-session-token")||Cookie.get("ironlog_session")||LS.get("ft-onb")||LS.get("tl-onb"));
        d({type:"INIT",p:{entries,sessions,gratitude,profile:localProfile,onboarded:true}});
      }catch(e){
        d({type:"INIT",p:{entries:[],sessions:[],gratitude:[],profile:{},onboarded:true}});
      }
    })();
  },[]);
  useEffect(()=>{
    if(!s.loaded)return;
    LS.set("tl-entries",s.entries);
    LS.set("tl-sessions",s.sessions);
    LS.set("tl-gratitude",s.gratitude);
    LS.set("tl-profile",s.profile);
  },[s.entries,s.sessions,s.gratitude,s.profile,s.loaded]);

  if(!s.loaded)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:V.bg,flexDirection:"column",gap:16}}><div style={{fontSize:44,animation:"breathe 2s ease-in-out infinite"}}>🧠</div><div style={{fontSize:11,color:V.text3,fontFamily:V.mono,animation:"pulse 1.5s infinite"}}>Loading...</div></div>;

  const tabs=[{id:"home",label:"Today",icon:"🏠"},{id:"journal",label:"Journal",icon:"📓"},{id:"sessions",label:"Sessions",icon:"🛋️"},{id:"trends",label:"Trends",icon:"📈"},{id:"settings",label:"Settings",icon:"⚙️"}];

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:V.bg}}>
      <header style={{paddingTop:`max(16px,env(safe-area-inset-top,0px))`,paddingLeft:16,paddingRight:16,paddingBottom:10,background:V.navBg,borderBottom:`1px solid ${V.cardBorder}`,flexShrink:0,backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${V.accent}15,${V.accent2}10)`,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:20}} aria-hidden="true">🧠</span>
            </div>
            <div>
              <h1 style={{fontSize:17,fontWeight:800,color:V.text,lineHeight:1,margin:0}}>TherapyLog</h1>
              <div style={{fontSize:9,color:V.text3,fontWeight:600,letterSpacing:".1em"}}>by IRONLOG</div>
            </div>
          </div>
          {(()=>{const t=s.entries.find(e=>e.date===today());return t?<div style={{textAlign:"right",padding:"4px 10px",borderRadius:10,background:`${(t.mood<=3?V.danger:t.mood<=6?V.warm:V.green)}08`}} aria-label={`Today's mood: ${t.mood} out of 10`}><div style={{fontSize:20,fontWeight:900,fontFamily:V.mono,color:t.mood<=3?V.danger:t.mood<=6?V.warm:V.green}}>{t.mood}<span style={{fontSize:9,color:V.text3}}>/10</span></div><div style={{fontSize:9,color:V.text3}}>today</div></div>:null;})()}
        </div>
      </header>
      <main role="tabpanel" aria-label={tabs.find(t=>t.id===s.tab)?.label||"Content"} style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",overscrollBehavior:"contain"}}>
        <div className="main-scroll" style={{paddingTop:16}}>
          {s.tab==="home"&&<HomeTab s={s} d={d} score={score} missions={missions}/>}
          {s.tab==="journal"&&<JournalTab s={s} d={d}/>}
          {s.tab==="sessions"&&<SessionsTab s={s} d={d}/>}
          {s.tab==="trends"&&<TrendsTab s={s}/>}
          {s.tab==="settings"&&<SettingsTab s={s} d={d} score={score}/>}
        </div>
      </main>
      <nav className="tab-bar" role="tablist" aria-label="Main navigation" style={{background:V.navBg,borderTop:`1px solid ${V.cardBorder}`,display:"flex",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",flexShrink:0,paddingTop:6}}>
        {tabs.map(tab=>{
          const active=s.tab===tab.id;
          return(
            <button key={tab.id} role="tab" aria-selected={active} aria-label={tab.label} onClick={()=>{Haptic.light();d({type:"TAB",tab:tab.id});}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"6px 0",WebkitTapHighlightColor:"transparent",outline:"none",position:"relative"}} onKeyDown={(e)=>{
              if(e.key==="ArrowRight"||e.key==="ArrowLeft"){
                const idx=tabs.findIndex(t=>t.id===tab.id);
                const next=e.key==="ArrowRight"?tabs[(idx+1)%tabs.length]:tabs[(idx-1+tabs.length)%tabs.length];
                d({type:"TAB",tab:next.id});
                e.currentTarget.parentElement?.querySelector(`[aria-label="${next.label}"]`)?.focus();
              }
            }}>
              {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:24,height:3,borderRadius:2,background:`linear-gradient(90deg,${V.accent},${V.accent2})`,transition:"width .2s"}} aria-hidden="true"/>}
              <span style={{fontSize:19,opacity:active?1:.45,transition:"opacity .2s",marginTop:2}} aria-hidden="true">{tab.icon}</span>
              <span style={{fontSize:9,fontWeight:active?700:500,color:active?V.accent:V.text3,transition:"color .2s"}}>{tab.label}</span>
            </button>
          );
        })}
      </nav>
      <ToastDisplay/><GlobalConfirm/><UndoToastBar/>{celebrating&&celebRank&&<LevelUpCelebration rank={celebRank} onDismiss={dismissLevel}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
