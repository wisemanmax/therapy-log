    s.onerror=function(){loadStatus[name]='FAILED';reject(new Error(name+' failed from '+url));};

  });
}

// ─── TherapyLog XP Calculation ───
function calcScore(s){
  let xp=0;
  const entries=s.entries||[];
  // Check-ins: 20 XP each
  xp+=entries.filter(e=>e.mood).length*20;
  // Journal entries: 25 XP each
  xp+=entries.filter(e=>e.type==="journal").length*25;
  // Gratitude: 5 XP each (cap 15 per day)
  const gratByDay={};(s.gratitude||[]).forEach(g=>{gratByDay[g.date]=(gratByDay[g.date]||0)+1;});
  Object.values(gratByDay).forEach(n=>xp+=Math.min(n,3)*5);
  // Sessions: 50 XP each
  xp+=(s.sessions||[]).length*50;
  // Streak milestones
  let streak=0;const days=new Set(entries.filter(e=>e.mood).map(e=>e.date));
  for(let i=0;i<90;i++){const d=new Date();d.setDate(d.getDate()-i);if(days.has(d.toISOString().split("T")[0]))streak++;else break;}
  if(streak>=7)xp+=100;if(streak>=14)xp+=200;if(streak>=30)xp+=500;
  const rank=[...IRON_RANKS].reverse().find(r=>xp>=r.xpNeeded)||IRON_RANKS[0];
  const nextRank=IRON_RANKS.find(r=>r.level===rank.level+1);
  const xpIntoRank=xp-rank.xpNeeded;
  const xpForNext=nextRank?(nextRank.xpNeeded-rank.xpNeeded):null;
  const pct=xpForNext?Math.min(100,Math.round(xpIntoRank/xpForNext*100)):100;
  return{xp,rank,nextRank,xpIntoRank,xpForNext,pct,streak};
}

// ─── TherapyLog Daily Missions ───
function getDailyMissions(s){
  const td=today();
  const todayCheckin=(s.entries||[]).some(e=>e.date===td&&e.mood);
  const todayJournal=(s.entries||[]).some(e=>e.date===td&&e.note&&e.note.length>30);
  const todayGratCount=(s.gratitude||[]).filter(g=>g.date===td).length;
  const sessionThisWeek=(()=>{const d=new Date();const wStart=new Date(d);wStart.setDate(d.getDate()-d.getDay());return(s.sessions||[]).some(sess=>sess.date>=wStart.toISOString().split("T")[0]);})();
  const moodToday=(s.entries||[]).find(e=>e.date===td&&e.mood);
  const goodMood=moodToday&&moodToday.mood>=7;
  return[
    {icon:"✅",title:"Daily Check-in",desc:"Complete today's mood check-in",xp:25,done:todayCheckin},
    {icon:"📓",title:"Journal Entry",desc:"Write a journal entry (30+ chars)",xp:30,done:todayJournal},
    {icon:"🌸",title:"3 Gratitudes",desc:"Log three things you're grateful for",xp:20,done:todayGratCount>=3},
    {icon:"🛋️",title:"Log a Session",desc:"Record a therapy session this week",xp:50,done:sessionThisWeek},
    {icon:"😊",title:"Good Mood Day",desc:"Check in with a mood of 7 or higher",xp:15,done:goodMood},
    {icon:"🛡️",title:"Use Coping Tool",desc:"View the coping toolkit today",xp:10,done:LS.get("tl-coping-viewed")===td},
  ];
}

// ─── Level-Up Detection Hook ───
function useLevelUp(score,lsKey){
  const {rank}=score;
  const [celebrating,setCelebrating]=useState(false);
  const [celebRank,setCelebRank]=useState(null);
  useEffect(()=>{
    const saved=parseInt(LS.get(lsKey)||"1");
    if(rank.level>saved){
      LS.set(lsKey,rank.level);
      setCelebRank(rank);
      setTimeout(()=>setCelebrating(true),400);
    } else if(!LS.get(lsKey)){LS.set(lsKey,rank.level);}
  },[rank.level]);
  return{celebrating,celebRank,dismiss:()=>setCelebrating(false)};
}

const init={tab:"home",entries:[],sessions:[],gratitude:[],triggers:[],loaded:false,onboarded:false,profile:{name:"",therapist:"",nextSession:""},goals:{journalStreak:0}};
function reducer(s,a){
  switch(a.type){
    case "INIT":return{...s,...a.p,loaded:true};
    case "TAB":return{...s,tab:a.tab};
    case "ADD_ENTRY":return{...s,entries:[a.entry,...s.entries]};
    case "DEL_ENTRY":return{...s,entries:s.entries.filter(e=>e.id!==a.id)};
    case "ADD_SESSION":return{...s,sessions:[a.session,...s.sessions]};
    case "DEL_SESSION":return{...s,sessions:s.sessions.filter(e=>e.id!==a.id)};
    case "ADD_GRATITUDE":return{...s,gratitude:[a.g,...s.gratitude].slice(0,90)};
    case "ADD_TRIGGER":return{...s,triggers:[a.t,...s.triggers].slice(0,60)};
    case "PROFILE":return{...s,profile:{...s.profile,...a.p}};
    case "ONBOARD":return{...s,...a.data,onboarded:true,loaded:true};
    default:return s;
  }
}

      <MissionsPanel missions={missions}/>

      {/* Status strip */}
      {nextSession&&daysUntil!==null&&daysUntil>=0&&(
        <div style={{padding:"10px 14px",borderRadius:12,background:`${V.accent}08`,border:`1px solid ${V.accent}20`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,color:V.text3}}>Next therapy session</div>
            <div style={{fontSize:13,fontWeight:700,color:V.accent}}>{daysUntil===0?"Today!":daysUntil===1?"Tomorrow":`In ${daysUntil} days`}</div>
          </div>
          <div style={{fontSize:28}}>🛋️</div>
        </div>
      )}

      {/* Today's mood card */}
      {!todayEntry?(
        <Card glow style={{padding:20,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:8}}>🌅</div>
          <div style={{fontSize:17,fontWeight:700,color:V.text,marginBottom:4}}>How are you feeling today?</div>
          <div style={{fontSize:13,color:V.text3,marginBottom:16}}>Take a moment to check in with yourself</div>
          <Btn full onClick={()=>setShowCheckin(true)}>Daily Check-in</Btn>
        </Card>
      ):(
        <Card style={{padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <div style={{fontSize:10,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}}>Today's Mood</div>
              <div style={{fontSize:36,fontWeight:900,fontFamily:V.mono,color:todayEntry.mood<=3?V.danger:todayEntry.mood<=6?V.warm:V.green}}>{todayEntry.mood}<span style={{fontSize:12,color:V.text3}}>/10</span></div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:10,color:V.text3}}>{todayEntry.time||""}</div>
              {todayEntry.emotions?.length>0&&<div style={{fontSize:18,marginTop:4}}>{todayEntry.emotions.slice(0,4).map(em=>EMOTIONS.find(e=>e.label===em)?.e||"").join("")}</div>}
            </div>
          </div>
          {todayEntry.note&&<div style={{fontSize:13,color:V.text2,lineHeight:1.6,fontStyle:"italic",borderLeft:`2px solid ${V.accent}40`,paddingLeft:10,marginBottom:8}}>"{todayEntry.note}"</div>}
          <Btn v="small" onClick={()=>setShowCheckin(true)}>Update Check-in</Btn>
        </Card>
      )}

      {/* Quick stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        {[
          {label:"7d Avg",value:avgMood||"—",unit:avgMood?"":"",color:moodColor},
          {label:"Streak",value:streak,unit:"d",color:V.accent},
          {label:"Sessions",value:s.sessions.length,unit:"",color:V.accent2},
        ].map(m=>(
          <Card key={m.label} style={{padding:12,textAlign:"center"}}>
            <div style={{fontSize:10,color:V.text3,fontWeight:600,marginBottom:2}}>{m.label}</div>
            <div style={{fontSize:22,fontWeight:800,color:m.color,fontFamily:V.mono}}>{m.value}<span style={{fontSize:10,color:V.text3}}>{m.unit}</span></div>
          </Card>
        ))}
      </div>

      {/* Gratitude section */}
      <Card style={{padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:13,fontWeight:700,color:V.text}}>🌸 Gratitude <span style={{fontSize:10,color:V.text3,fontWeight:400}}>({todayGratitude.length}/3 today)</span></div>
          {todayGratitude.length<3&&<Btn v="small" onClick={()=>setShowGratitude(true)}>+ Add</Btn>}
        </div>
        {todayGratitude.length===0?(
          <div style={{fontSize:12,color:V.text3,textAlign:"center",padding:"8px 0"}}>Nothing logged yet. What are you grateful for?</div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {todayGratitude.map((g,i)=>(
              <div key={g.id} style={{fontSize:13,color:V.text2,padding:"6px 10px",borderRadius:8,background:"rgba(255,255,255,0.02)",borderLeft:`3px solid ${[V.accent,V.accent2,V.green][i%3]}`}}>
                {g.text}
              </div>
            ))}
          </div>
        )}
      </Card>

      {/* Weekly Wellness Summary */}
      {recent7.length>=2&&(()=>{
        const journalsThisWeek=s.entries.filter(e=>e.date>=ago(6)&&e.type==="journal").length;
        const gratThisWeek=s.gratitude.filter(g=>g.date>=ago(6)).length;
        const sessionsThisWeek=s.sessions.filter(se=>se.date>=ago(6)).length;
        const moodTrend=recent7.length>=2?(recent7[0].mood||5)-(recent7[recent7.length-1].mood||5):0;
        const topEmotions={};recent7.forEach(e=>(e.emotions||[]).forEach(em=>{topEmotions[em]=(topEmotions[em]||0)+1;}));
        const topEmotion=Object.entries(topEmotions).sort((a,b)=>b[1]-a[1])[0];
        return(
          <Card style={{padding:14}}>
            <div style={{fontSize:13,fontWeight:700,color:V.text,marginBottom:10}}>📊 Weekly Summary</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              <div style={{padding:"8px 10px",borderRadius:10,background:"rgba(255,255,255,0.02)"}}>
                <div style={{fontSize:10,color:V.text3}}>Journal entries</div>
                <div style={{fontSize:16,fontWeight:800,color:V.accent,fontFamily:V.mono}}>{journalsThisWeek}</div>
              </div>
              <div style={{padding:"8px 10px",borderRadius:10,background:"rgba(255,255,255,0.02)"}}>
                <div style={{fontSize:10,color:V.text3}}>Gratitudes</div>
                <div style={{fontSize:16,fontWeight:800,color:V.green,fontFamily:V.mono}}>{gratThisWeek}</div>
              </div>
            </div>
            {moodTrend!==0&&(
              <div style={{fontSize:12,color:moodTrend>0?V.green:moodTrend<0?V.warm:V.text3,marginBottom:6}}>
                {moodTrend>0?"↑":"↓"} Mood {moodTrend>0?"improved":"dipped"} by {Math.abs(moodTrend)} point{Math.abs(moodTrend)!==1?"s":""} this week
              </div>
            )}
            {topEmotion&&(
              <div style={{fontSize:12,color:V.text3}}>
                Most felt emotion: <span style={{color:V.accent,fontWeight:600}}>{EMOTIONS.find(e=>e.label===topEmotion[0])?.e||""} {topEmotion[0]}</span> ({topEmotion[1]}x)
              </div>
            )}
          </Card>
        );
      })()}

      {/* Coping strategies */}
      <Card style={{padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:13,fontWeight:700,color:V.text}}>🛡️ Coping Toolkit</div>
          <Btn v="small" onClick={markCopingViewed}>View All</Btn>
        </div>
        {(()=>{
          const cat=COPING[Math.floor(Date.now()/86400000)%COPING.length];
          return(
            <div>
              <div style={{fontSize:10,color:V.accent,fontWeight:700,marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>{cat.cat}</div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {cat.items.slice(0,3).map((item,i)=>(
                  <div key={i} style={{fontSize:13,color:V.text2,padding:"6px 10px",borderRadius:8,background:"rgba(255,255,255,0.02)"}}>{item}</div>
                ))}
              </div>
            </div>
          );
        })()}
      </Card>

      {/* Check-in sheet */}
      {showCheckin&&(
        <Sheet title="Daily Check-in" onClose={()=>setShowCheckin(false)} footer={<Btn full onClick={saveCheckin}>{todayEntry?"Update Check-in":"Save Check-in"}</Btn>}>
          <div style={{marginBottom:20}}><MoodSlider value={mood} onChange={setMood}/></div>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Emotions (select all that apply)</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {EMOTIONS.map(em=>(
                <button key={em.label} onClick={()=>toggleEmotion(em.label)} role="checkbox" aria-checked={emotions.includes(em.label)} aria-label={`${em.label} emotion`}
                  style={{padding:"7px 12px",borderRadius:20,border:`1px solid ${emotions.includes(em.label)?V.accent:V.cardBorder}`,background:emotions.includes(em.label)?`${V.accent}18`:"rgba(255,255,255,0.03)",cursor:"pointer",fontSize:12,color:emotions.includes(em.label)?V.accent:V.text2,fontFamily:V.font,display:"flex",alignItems:"center",gap:4}}>
                  <span aria-hidden="true">{em.e}</span><span>{em.label}</span>
                </button>
              ))}
            </div>
          </div>
          <Field label="Notes (optional)" value={note} onChange={setNote} rows={4} placeholder="What's on your mind? How was your day?"/>
        </Sheet>
      )}

      {showGratitude&&(
        <Sheet title="Gratitude" onClose={()=>setShowGratitude(false)} footer={<Btn full onClick={saveGratitude}>Save</Btn>}>
          <div style={{fontSize:13,color:V.text3,marginBottom:16}}>What are you grateful for right now?</div>
          <Field value={gText} onChange={setGText} rows={4} placeholder="I'm grateful for..." autoFocus/>
        </Sheet>
      )}

      {showCoping&&(
        <Sheet title="Coping Toolkit" onClose={()=>setShowCoping(false)}>
          {COPING.map((cat,ci)=>(
            <div key={ci} style={{marginBottom:20}}>
              <div style={{fontSize:11,fontWeight:700,color:V.accent,textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>{cat.cat}</div>
              {cat.items.map((item,i)=>(
                <div key={i} style={{padding:"10px 12px",borderRadius:10,background:V.card,border:`1px solid ${V.cardBorder}`,marginBottom:6,fontSize:13,color:V.text2}}>{item}</div>
              ))}
            </div>
          ))}
        </Sheet>
      )}
    </div>
  );
}

// ─── JOURNAL TAB ───
function JournalTab({s,d}){
  const [showNew,setShowNew]=useState(false);
  const [text,setText]=useState("");
  const [prompt,setPrompt]=useState(PROMPTS[0]);
  const [usePrompt,setUsePrompt]=useState(false);
  const [triggers,setTriggers]=useState([]);
  const [newTrigger,setNewTrigger]=useState("");

  const randomPrompt=()=>setPrompt(PROMPTS[Math.floor(Math.random()*PROMPTS.length)]);

  const saveEntry=()=>{
    if(!text.trim())return;
    d({type:"ADD_ENTRY",entry:{id:uid(),date:today(),time:fmtTime(),type:"journal",mood:5,emotions:[],note:sanitizeEntry(text.trim()),prompt:usePrompt?prompt:null,triggers:triggers.map(t=>sanitize(t))}});
    Toast.show("Journal saved 💜",V.accent);Haptic.success();
    setText("");setTriggers([]);setShowNew(false);
  };

  const addTrigger=()=>{if(!newTrigger.trim())return;setTriggers(t=>[...t,newTrigger.trim()]);setNewTrigger("");};
  const journalEntries=s.entries.filter(e=>e.type==="journal");

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      <Btn full onClick={()=>setShowNew(true)}>✏️ New Journal Entry</Btn>

      {journalEntries.length===0&&(
        <Card style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:40,marginBottom:12}}>📓</div>
          <div style={{fontSize:15,fontWeight:600,color:V.text2,marginBottom:6}}>Your journal awaits</div>
          <div style={{fontSize:13,color:V.text3,marginBottom:16,lineHeight:1.6}}>Writing helps process emotions and gain clarity. Start with a prompt or free-write.</div>
          <Btn v="small" onClick={()=>setShowNew(true)}>Start Writing</Btn>
        </Card>
      )}

      {journalEntries.map(e=>(
        <Card key={e.id} style={{padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <div style={{fontSize:12,color:V.text3}}>{fmtFull(e.date)}{e.time?` · ${e.time}`:""}</div>
              {e.emotions?.length>0&&<div style={{fontSize:16,marginTop:2}}>{e.emotions.slice(0,4).map(em=>EMOTIONS.find(x=>x.label===em)?.e||"").join("")}</div>}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {e.mood&&<span style={{fontSize:13,fontWeight:700,fontFamily:V.mono,color:e.mood<=3?V.danger:e.mood<=6?V.warm:V.green}}>{e.mood}</span>}
              <button onClick={()=>Confirm.show("Delete entry?","This cannot be undone.",()=>d({type:"DEL_ENTRY",id:e.id}))} aria-label="Delete entry" style={{background:"none",border:"none",padding:4,cursor:"pointer",opacity:.6}}>
                <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
              </button>
            </div>
          </div>
          {e.prompt&&<div style={{fontSize:11,color:V.accent,fontStyle:"italic",marginBottom:6,paddingLeft:8,borderLeft:`2px solid ${V.accent}40`}}>{e.prompt}</div>}
          <div style={{fontSize:13,color:V.text2,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{e.note?.length>200?e.note.slice(0,200)+"...":e.note}</div>
          {e.triggers?.length>0&&(
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:8}}>
              {e.triggers.map((t,i)=>(
                <span key={i} style={{fontSize:10,padding:"2px 8px",borderRadius:12,background:"rgba(244,63,94,0.12)",color:V.danger,fontWeight:600}}>⚡ {t}</span>
              ))}
            </div>
          )}
        </Card>
      ))}

      {showNew&&(
        <Sheet title="New Entry" onClose={()=>{setShowNew(false);setText("");setTriggers([]);}} footer={<Btn full onClick={saveEntry} disabled={!text.trim()}>Save Entry</Btn>}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <button onClick={()=>setUsePrompt(u=>!u)} style={{padding:"7px 12px",borderRadius:20,border:`1px solid ${usePrompt?V.accent:V.cardBorder}`,background:usePrompt?`${V.accent}12`:"transparent",color:usePrompt?V.accent:V.text3,fontSize:12,cursor:"pointer",fontFamily:V.font}}>
              {usePrompt?"✓ Prompt":"Use Prompt"}
            </button>
            {usePrompt&&<button onClick={randomPrompt} style={{padding:"7px 12px",borderRadius:20,border:`1px solid ${V.cardBorder}`,background:"transparent",color:V.text3,fontSize:12,cursor:"pointer",fontFamily:V.font}}>🔀 Different</button>}
          </div>
          {usePrompt&&<div style={{padding:"10px 14px",borderRadius:10,background:`${V.accent}08`,border:`1px solid ${V.accent}15`,fontSize:13,color:V.accent2,lineHeight:1.5,marginBottom:14,fontStyle:"italic"}}>{prompt}</div>}
          <Field value={text} onChange={setText} rows={8} placeholder="Start writing..." autoFocus/>
          <div style={{marginTop:4}}>
            <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Triggers (optional)</div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              <input value={newTrigger} onChange={e=>setNewTrigger(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTrigger()} placeholder="e.g. work stress, conflict..."
                style={{flex:1,padding:"8px 12px",background:"rgba(255,255,255,0.04)",border:`1px solid ${V.cardBorder}`,borderRadius:10,color:V.text,fontSize:13,fontFamily:V.font,outline:"none"}}/>
              <button onClick={addTrigger} style={{padding:"8px 14px",borderRadius:10,background:`${V.danger}15`,border:"none",color:V.danger,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:V.font}}>+ Add</button>
            </div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {triggers.map((t,i)=>(
                <span key={i} onClick={()=>setTriggers(ts=>ts.filter((_,j)=>j!==i))} style={{fontSize:10,padding:"4px 10px",borderRadius:12,background:"rgba(244,63,94,0.12)",color:V.danger,fontWeight:600,cursor:"pointer"}}>⚡ {t} ×</span>
              ))}
            </div>
          </div>
        </Sheet>
      )}
    </div>
  );
}

// ─── SESSIONS TAB ───
function SessionsTab({s,d}){
  const [showNew,setShowNew]=useState(false);
  const [form,setForm]=useState({date:today(),therapist:"",duration:"50",notes:"",homework:"",mood_before:"5",mood_after:"6",topics:[]});
  const TOPICS=SESSION_TOPICS;
  const toggleTopic=(t)=>setForm(f=>({...f,topics:f.topics.includes(t)?f.topics.filter(x=>x!==t):[...f.topics,t]}));

  const save=()=>{
    const session={id:uid(),date:validateDate(form.date)||today(),therapist:sanitize(form.therapist),duration:Math.max(1,Math.min(480,parseInt(form.duration)||50)),notes:sanitizeEntry(form.notes),homework:sanitizeEntry(form.homework),mood_before:validateMood(form.mood_before),mood_after:validateMood(form.mood_after),topics:form.topics.filter(t=>TOPICS.includes(t))};
    d({type:"ADD_SESSION",session});Toast.show("Session logged 🛋️",V.accent2);Haptic.success();setShowNew(false);
    setForm({date:today(),therapist:"",duration:"50",notes:"",homework:"",mood_before:"5",mood_after:"6",topics:[]});
  };

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      <Btn full onClick={()=>setShowNew(true)}>+ Log Session</Btn>

      {s.profile?.nextSession&&(
        <Card style={{padding:14,background:`${V.accent}06`,border:`1px solid ${V.accent}20`}}>
          <div style={{fontSize:10,color:V.text3,fontWeight:600,marginBottom:4}}>NEXT SESSION</div>
          <div style={{fontSize:15,fontWeight:700,color:V.accent}}>{fmtFull(s.profile.nextSession)}</div>
          {s.profile.therapist&&<div style={{fontSize:12,color:V.text3,marginTop:2}}>{s.profile.therapist}</div>}
        </Card>
      )}

      {s.sessions.length===0&&(
        <Card style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:40,marginBottom:12}}>🛋️</div>
          <div style={{fontSize:15,fontWeight:600,color:V.text2,marginBottom:6}}>No sessions logged yet</div>
          <div style={{fontSize:13,color:V.text3,marginBottom:16,lineHeight:1.6}}>Track your therapy progress, homework, and mood changes after each session.</div>
          <Btn v="small" onClick={()=>setShowNew(true)}>Log Your First Session</Btn>
        </Card>
      )}

      {s.sessions.map(session=>(
        <Card key={session.id} style={{padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:V.text}}>{session.therapist||"Therapy Session"}</div>
              <div style={{fontSize:11,color:V.text3}}>{fmtFull(session.date)} · {session.duration}min</div>
            </div>
            <div style={{display:"flex",gap:4,alignItems:"center"}}>
              <div style={{fontSize:12,fontFamily:V.mono,color:V.text3}}>
                <span style={{color:session.mood_before<=4?V.danger:session.mood_before<=6?V.warm:V.green}}>{session.mood_before}</span>
                <span> → </span>
                <span style={{color:session.mood_after<=4?V.danger:session.mood_after<=6?V.warm:V.green}}>{session.mood_after}</span>
              </div>
              <button onClick={()=>Confirm.show("Delete session?","This cannot be undone.",()=>d({type:"DEL_SESSION",id:session.id}))} aria-label="Delete session" style={{background:"none",border:"none",padding:4,cursor:"pointer"}}>
                <svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke={V.text3} strokeWidth="2" strokeLinecap="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
              </button>
            </div>
          </div>
          {session.topics?.length>0&&(
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
              {session.topics.map((t,i)=>(
                <span key={i} style={{fontSize:10,padding:"2px 8px",borderRadius:12,background:`${V.accent}12`,color:V.accent,fontWeight:600}}>{t}</span>
              ))}
            </div>
          )}
          {session.notes&&<div style={{fontSize:13,color:V.text2,lineHeight:1.6,marginBottom:6}}>{session.notes}</div>}
          {session.homework&&(
            <div style={{padding:"8px 10px",borderRadius:8,background:`${V.accent2}08`,border:`1px solid ${V.accent2}20`}}>
              <div style={{fontSize:10,color:V.accent2,fontWeight:700,marginBottom:2}}>HOMEWORK</div>
              <div style={{fontSize:12,color:V.text2}}>{session.homework}</div>
            </div>
          )}
        </Card>
      ))}

      {showNew&&(
        <Sheet title="Log Session" onClose={()=>setShowNew(false)} footer={<Btn full onClick={save}>Save Session</Btn>}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Date" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
            <Field label="Duration (min)" type="number" value={form.duration} onChange={v=>setForm(f=>({...f,duration:v}))}/>
          </div>
          <Field label="Therapist Name" value={form.therapist} onChange={v=>setForm(f=>({...f,therapist:v}))} placeholder="Optional"/>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:V.text3,fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Topics Covered</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {TOPICS.map(t=>(
                <button key={t} onClick={()=>toggleTopic(t)} style={{padding:"6px 12px",borderRadius:16,border:`1px solid ${form.topics.includes(t)?V.accent:V.cardBorder}`,background:form.topics.includes(t)?`${V.accent}12`:"transparent",color:form.topics.includes(t)?V.accent:V.text3,fontSize:12,cursor:"pointer",fontFamily:V.font}}>{t}</button>
              ))}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div>
              <div style={{fontSize:11,color:V.text3,fontWeight:600,marginBottom:6}}>MOOD BEFORE (1-10)</div>
              <input type="range" min={1} max={10} value={form.mood_before} onChange={e=>setForm(f=>({...f,mood_before:e.target.value}))} style={{width:"100%"}}/>
              <div style={{textAlign:"center",fontSize:12,color:V.text3,fontFamily:V.mono}}>{form.mood_before}</div>
            </div>
            <div>
              <div style={{fontSize:11,color:V.text3,fontWeight:600,marginBottom:6}}>MOOD AFTER (1-10)</div>

// ─── TRENDS TAB ───
function TrendsTab({s}){
  const moodData=useMemo(()=>s.entries.filter(e=>e.mood&&e.date>=ago(29)).sort((a,b)=>a.date.localeCompare(b.date)).map(e=>({date:fmtShort(e.date),mood:e.mood})),[s.entries]);
  const sessionMoodData=useMemo(()=>s.sessions.filter(e=>e.date>=ago(89)).sort((a,b)=>a.date.localeCompare(b.date)).map((e,i)=>({label:`S${i+1}`,before:e.mood_before,after:e.mood_after})),[s.sessions]);
  const emotionCounts=useMemo(()=>{
    const counts={};
    s.entries.filter(e=>e.date>=ago(29)).forEach(e=>e.emotions?.forEach(em=>{counts[em]=(counts[em]||0)+1;}));
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  },[s.entries]);

  if(s.entries.filter(e=>e.mood).length<3)return(
    <div className="fade-up" style={{textAlign:"center",padding:"60px 20px",color:V.text3}}>
      <div style={{fontSize:48,marginBottom:12}}>📈</div>
      <div style={{fontSize:16,fontWeight:600,color:V.text2,marginBottom:6}}>Almost there!</div>
      <div style={{fontSize:13,lineHeight:1.6}}>Complete {3-s.entries.filter(e=>e.mood).length} more daily check-in{3-s.entries.filter(e=>e.mood).length!==1?"s":""} to unlock your mood trends and insights.</div>
      <Progress val={s.entries.filter(e=>e.mood).length} max={3} color={V.accent} h={4}/>
      <div style={{fontSize:10,color:V.text3,marginTop:6}}>{s.entries.filter(e=>e.mood).length}/3 check-ins</div>
    </div>
  );

  const recent7=s.entries.filter(e=>e.date>=ago(6)&&e.mood);
  const avgMood=recent7.length?Math.round(recent7.reduce((a,e)=>a+e.mood,0)/recent7.length*10)/10:0;

  return(
    <div className="fade-up" style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Card style={{padding:14,textAlign:"center"}}>
          <div style={{fontSize:10,color:V.text3,fontWeight:600,marginBottom:2}}>7-DAY AVG MOOD</div>
          <div style={{fontSize:28,fontWeight:900,fontFamily:V.mono,color:avgMood<=4?V.danger:avgMood<=6?V.warm:V.green}}>{avgMood||"—"}</div>
        </Card>
        <Card style={{padding:14,textAlign:"center"}}>
          <div style={{fontSize:10,color:V.text3,fontWeight:600,marginBottom:2}}>TOTAL SESSIONS</div>
          <div style={{fontSize:28,fontWeight:900,fontFamily:V.mono,color:V.accent2}}>{s.sessions.length}</div>
        </Card>
      </div>

      {moodData.length>1&&(
        <Card>
          <div style={{fontSize:10,fontWeight:700,color:V.text3,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Mood Trend (30d)</div>
          <ResponsiveContainer width="100%" height={150}>
            <AreaChart data={moodData}>
              <defs><linearGradient id="moodGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={V.accent} stopOpacity={0.3}/><stop offset="95%" stopColor={V.accent} stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid {...chartCfg.grid} vertical={false}/>
              <XAxis dataKey="date" {...chartCfg.axis} interval="preserveStartEnd"/>
              <YAxis {...chartCfg.axis} width={20} domain={[1,10]}/>
              <Tooltip {...chartCfg.tip}/>
              <ReferenceLine y={5} stroke={V.cardBorder} strokeDasharray="3 3"/>
              <Area type="monotone" dataKey="mood" stroke={V.accent} strokeWidth={2} fill="url(#moodGrad)" name="Mood"/>
            </AreaChart>
          </ResponsiveContainer>
        </Card>
      )}

      {sessionMoodData.length>1&&(
        <Card>
          <div style={{fontSize:10,fontWeight:700,color:V.text3,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Session Mood Before/After</div>
          <ResponsiveContainer width="100%" height={130}>
            <LineChart data={sessionMoodData}>
              <CartesianGrid {...chartCfg.grid} vertical={false}/>
              <XAxis dataKey="label" {...chartCfg.axis}/>
              <YAxis {...chartCfg.axis} width={20} domain={[1,10]}/>
              <Tooltip {...chartCfg.tip}/>
              <Line type="monotone" dataKey="before" stroke={V.warm} strokeWidth={2} dot={false} name="Before"/>
              <Line type="monotone" dataKey="after" stroke={V.green} strokeWidth={2} dot={false} name="After"/>
            </LineChart>
          </ResponsiveContainer>
          <div style={{display:"flex",gap:12,marginTop:6}}>
            {[{c:V.warm,l:"Before"},{c:V.green,l:"After"}].map(x=>(
              <div key={x.l} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:x.c}}/><span style={{fontSize:9,color:V.text3}}>{x.l}</span></div>
            ))}
          </div>
        </Card>
      )}

      {/* Wellness Insights */}
      {moodData.length>=5&&(()=>{
        const recentAvg=moodData.slice(-7).reduce((a,d)=>a+d.mood,0)/Math.min(7,moodData.length);
        const olderAvg=moodData.length>7?moodData.slice(0,-7).reduce((a,d)=>a+d.mood,0)/moodData.slice(0,-7).length:recentAvg;
        const trend=recentAvg-olderAvg;
        const positiveEmotions=s.entries.filter(e=>e.date>=ago(6)).reduce((c,e)=>c+(e.emotions||[]).filter(em=>EMOTIONS.find(x=>x.label===em)?.valence>0).length,0);
        const negativeEmotions=s.entries.filter(e=>e.date>=ago(6)).reduce((c,e)=>c+(e.emotions||[]).filter(em=>EMOTIONS.find(x=>x.label===em)?.valence<0).length,0);
        const ratio=negativeEmotions>0?(positiveEmotions/negativeEmotions).toFixed(1):"--";
        return(
          <Card style={{padding:14}}>
            <div style={{fontSize:10,fontWeight:700,color:V.text3,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Wellness Insights</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div style={{padding:"10px 12px",borderRadius:10,background:"rgba(255,255,255,0.02)"}}>
                <div style={{fontSize:10,color:V.text3,marginBottom:4}}>Mood Trend</div>
                <div style={{fontSize:16,fontWeight:800,color:trend>0.3?V.green:trend<-0.3?V.danger:V.accent,fontFamily:V.mono}}>
                  {trend>0.3?"↑ Improving":trend<-0.3?"↓ Declining":"→ Stable"}
                </div>
              </div>
              <div style={{padding:"10px 12px",borderRadius:10,background:"rgba(255,255,255,0.02)"}}>
                <div style={{fontSize:10,color:V.text3,marginBottom:4}}>Positive:Negative Ratio</div>
                <div style={{fontSize:16,fontWeight:800,color:parseFloat(ratio)>=2?V.green:parseFloat(ratio)>=1?V.accent:V.warm,fontFamily:V.mono}}>{ratio}</div>
              </div>
            </div>
            {trend>0.3&&<div style={{fontSize:12,color:V.green,marginTop:8}}>Your mood has been trending upward. Keep going!</div>}
            {trend<-0.3&&<div style={{fontSize:12,color:V.warm,marginTop:8}}>Your mood has dipped recently. Consider reaching out to your therapist or trying a coping strategy.</div>}
          </Card>
        );
      })()}

      {emotionCounts.length>0&&(
        <Card style={{padding:14}}>
          <div style={{fontSize:10,fontWeight:700,color:V.text3,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Most Frequent Emotions (30d)</div>
          {emotionCounts.map(([em,count])=>{
            const emotionObj=EMOTIONS.find(e=>e.label===em);
            const max=emotionCounts[0][1];
            return(
              <div key={em} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <span style={{fontSize:16,width:20,flexShrink:0}}>{emotionObj?.e||"😐"}</span>
                <span style={{fontSize:12,color:V.text2,width:80,flexShrink:0}}>{em}</span>
                <div style={{flex:1,height:6,borderRadius:3,background:"rgba(255,255,255,0.05)"}}>
                  <div style={{height:"100%",borderRadius:3,width:`${count/max*100}%`,background:`linear-gradient(90deg,${emotionObj?.valence>0?V.green:emotionObj?.valence<0?V.danger:V.warm},transparent)`}}/>
                </div>
                <span style={{fontSize:11,color:V.text3,fontFamily:V.mono,width:20,textAlign:"right"}}>{count}</span>
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}

          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:V.text3,marginBottom:4}}>SESSIONS</div>
            <div style={{fontSize:18,fontWeight:800,color:V.accent2,fontFamily:V.mono}}>{s.sessions.length}</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:V.text3,marginBottom:4}}>GRATITUDES</div>

          </div>

          const data={version:2,entries:s.entries,sessions:s.sessions,gratitude:s.gratitude,profile:s.profile,exportedAt:new Date().toISOString()};
          const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
          const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`therapylog-backup-${today()}.json`;a.click();URL.revokeObjectURL(url);
          Toast.show("Data exported",V.accent);
        }} s={{marginBottom:8}}>Export Backup</Btn>
        <Btn v="secondary" full onClick={()=>{
          const input=document.createElement("input");input.type="file";input.accept=".json";
          input.onchange=(e)=>{
            const file=e.target.files[0];if(!file)return;
            const reader=new FileReader();
            reader.onload=(ev)=>{
              try{
                const data=JSON.parse(ev.target.result);
                if(!data.entries&&!data.sessions){Toast.show("Invalid backup file",V.danger);return;}
                Confirm.show("Import data?","This will merge the backup with your existing data. No data will be overwritten.",()=>{
                  const existing=new Set(s.entries.map(e=>e.id));
                  const newEntries=(data.entries||[]).filter(e=>e.id&&!existing.has(e.id));
                  const existingSessions=new Set(s.sessions.map(e=>e.id));
                  const newSessions=(data.sessions||[]).filter(e=>e.id&&!existingSessions.has(e.id));
                  const existingGrat=new Set(s.gratitude.map(e=>e.id));
                  const newGrat=(data.gratitude||[]).filter(e=>e.id&&!existingGrat.has(e.id));
                  newEntries.forEach(entry=>d({type:"ADD_ENTRY",entry}));
                  newSessions.forEach(session=>d({type:"ADD_SESSION",session}));
                  newGrat.forEach(g=>d({type:"ADD_GRATITUDE",g}));
                  Toast.show(`Imported ${newEntries.length+newSessions.length+newGrat.length} items`,V.green);
                });
              }catch(err){Toast.show("Could not read file",V.danger);}
            };
            reader.readAsText(file);
          };
          input.click();
        }} s={{marginBottom:8}}>Import Backup</Btn>
        <Btn v="danger" full onClick={()=>Confirm.show("Delete all data?","Journal entries, sessions, and gratitude logs will be permanently deleted. This cannot be undone.",()=>{
          LS.set("tl-entries",[]);LS.set("tl-sessions",[]);LS.set("tl-gratitude",[]);LS.set("tl-profile",{});window.location.reload();
        })}>Delete All Data</Btn>
      </Row>
    </div>
  );
}

// ─── APP ───
function App(){
  const [s,d]=useReducer(reducer,init);
  const [,forceUpdate]=useState(0);
  useEffect(()=>{window._themeRefresh=()=>forceUpdate(c=>c+1);return()=>{delete window._themeRefresh;};},[]);

  const score=useMemo(()=>calcScore(s),[s.entries,s.sessions,s.gratitude]);
  const missions=useMemo(()=>getDailyMissions(s),[s.entries,s.sessions,s.gratitude]);
  const {celebrating,celebRank,dismiss:dismissLevel}=useLevelUp(score,"tl-last-level");
  useEffect(()=>{
    const entries=Array.isArray(LS.get("tl-entries"))?LS.get("tl-entries"):[];
    const sessions=Array.isArray(LS.get("tl-sessions"))?LS.get("tl-sessions"):[];
    const gratitude=Array.isArray(LS.get("tl-gratitude"))?LS.get("tl-gratitude"):[];
    const profile=LS.get("tl-profile")||{};
    const onboarded=!!(LS.get("ft-session-token")||Cookie.get("ironlog_session")||LS.get("ft-onb")||LS.get("tl-onb"));
    d({type:"INIT",p:{entries,sessions,gratitude,profile,onboarded:true}});
  },[]);
  useEffect(()=>{
    if(!s.loaded)return;
    LS.set("tl-entries",s.entries);
    LS.set("tl-sessions",s.sessions);
    LS.set("tl-gratitude",s.gratitude);
    LS.set("tl-profile",s.profile);
  },[s.entries,s.sessions,s.gratitude,s.profile,s.loaded]);

  if(!s.loaded)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:V.bg,flexDirection:"column",gap:12}}><div style={{fontSize:36}}>🧠</div><div style={{fontSize:11,color:V.text3,fontFamily:V.mono,animation:"pulse 1.5s infinite"}}>Loading...</div></div>;

  const tabs=[{id:"home",label:"Today",icon:"🏠"},{id:"journal",label:"Journal",icon:"📓"},{id:"sessions",label:"Sessions",icon:"🛋️"},{id:"trends",label:"Trends",icon:"📈"},{id:"settings",label:"Settings",icon:"⚙️"}];

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:V.bg}}>
      <header style={{paddingTop:`max(16px,env(safe-area-inset-top,0px))`,paddingLeft:16,paddingRight:16,paddingBottom:10,background:V.navBg,borderBottom:`1px solid ${V.cardBorder}`,flexShrink:0,backdropFilter:"blur(12px)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:22}} aria-hidden="true">🧠</span>
            <div>
              <h1 style={{fontSize:16,fontWeight:800,color:V.text,lineHeight:1,margin:0}}>TherapyLog</h1>
              <div style={{fontSize:9,color:V.text3,fontWeight:600,letterSpacing:".1em"}}>by IRONLOG</div>
            </div>
          </div>
          {(()=>{const t=s.entries.find(e=>e.date===today());return t?<div style={{textAlign:"right"}} aria-label={`Today's mood: ${t.mood} out of 10`}><div style={{fontSize:18,fontWeight:900,fontFamily:V.mono,color:t.mood<=3?V.danger:t.mood<=6?V.warm:V.green}}>{t.mood}<span style={{fontSize:9,color:V.text3}}>/10</span></div><div style={{fontSize:9,color:V.text3}}>today</div></div>:null;})()}
        </div>
      </header>
      <main role="tabpanel" aria-label={tabs.find(t=>t.id===s.tab)?.label||"Content"} style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",overscrollBehavior:"contain"}}>
        <div className="main-scroll" style={{paddingTop:16}}>
          {s.tab==="home"&&<HomeTab s={s} d={d} score={score} missions={missions}/>}
          {s.tab==="journal"&&<JournalTab s={s} d={d}/>}
          {s.tab==="sessions"&&<SessionsTab s={s} d={d}/>}
          {s.tab==="trends"&&<TrendsTab s={s}/>}
          {s.tab==="settings"&&<SettingsTab s={s} d={d} score={score}/>}
        </div>
      </main>
      <nav className="tab-bar" role="tablist" aria-label="Main navigation" style={{background:V.navBg,borderTop:`1px solid ${V.cardBorder}`,display:"flex",backdropFilter:"blur(12px)",flexShrink:0,paddingTop:8}}>
        {tabs.map(tab=>{
          const active=s.tab===tab.id;
          return(
            <button key={tab.id} role="tab" aria-selected={active} aria-label={tab.label} onClick={()=>{Haptic.light();d({type:"TAB",tab:tab.id});}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"4px 0",WebkitTapHighlightColor:"transparent",outline:"none"}} onKeyDown={(e)=>{
              if(e.key==="ArrowRight"||e.key==="ArrowLeft"){
                const idx=tabs.findIndex(t=>t.id===tab.id);
                const next=e.key==="ArrowRight"?tabs[(idx+1)%tabs.length]:tabs[(idx-1+tabs.length)%tabs.length];
                d({type:"TAB",tab:next.id});
                e.currentTarget.parentElement?.querySelector(`[aria-label="${next.label}"]`)?.focus();
              }
            }}>
              <span style={{fontSize:18,opacity:active?1:.5}} aria-hidden="true">{tab.icon}</span>
              <span style={{fontSize:9,fontWeight:active?700:500,color:active?V.accent:V.text3}}>{tab.label}</span>
              {active&&<div style={{width:4,height:4,borderRadius:2,background:V.accent,marginTop:-2}} aria-hidden="true"/>}
            </button>
          );
        })}
      </nav>
      <ToastDisplay/><GlobalConfirm/><UndoToastBar/>{celebrating&&celebRank&&<LevelUpCelebration rank={celebRank} onDismiss={dismissLevel}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
